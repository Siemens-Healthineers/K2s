apiVersion: v1
kind: AddonManifest
metadata:
  name: rollout
  description: Automating the deployment/updating of applications using GitOps
spec:
  implementations:
    - name: argocd
      description: Automating the deployment/updating of applications using ArgoCD
      commands:
        enable:
          cli:
            flags:
              - name: ingress
                shorthand: i
                default: none
                description: Ingress controller to use for exposing the ArgoCD dashboard
                constraints:
                  kind: validation-set
                  validationSet:
                    - none
                    - nginx
                    - nginx-gw
                    - traefik
              - name: addon-sync
                default: true
                description: Deploy addon-sync infrastructure for GitOps addon delivery from OCI registry
            examples:
              - cmd: k2s addons enable rollout argocd
                comment: Enable rollout with ArgoCD in k2s
              - cmd: k2s addons enable rollout argocd --ingress traefik
                comment: Enable rollout with ArgoCD in k2s with traefik ingress
              - cmd: k2s addons enable rollout argocd --addon-sync=false
                comment: Enable rollout with ArgoCD without addon-sync infrastructure
          script:
            subPath: argocd/Enable.ps1
            parameterMappings:
              - cliFlagName: ingress
                scriptParameterName: Ingress
              - cliFlagName: addon-sync
                scriptParameterName: AddonSync
        disable:
          cli:
            examples:
              - cmd: k2s addons disable rollout argocd
                comment: Disable rollout ArgoCD addon in k2s
          script:
            subPath: argocd/Disable.ps1
    - name: fluxcd
      description: Automating the deployment/updating of applications using Flux CD
      offline_usage:
        linux:
          repos: []
          deb: []
          curl: []
          additionalImages: []
        windows:
          curl:
            - url: https://github.com/fluxcd/flux2/releases/download/v2.8.3/flux_2.8.3_windows_amd64.zip
              destination: bin\flux.exe
      commands:
        enable:
          cli:
            flags:
              - name: ingress
                shorthand: i
                default: none
                description: Ingress controller for webhook receiver (Git push notifications)
                constraints:
                  kind: validation-set
                  validationSet:
                    - none
                    - nginx
                    - nginx-gw
                    - traefik
              - name: addon-sync
                default: true
                description: Deploy addon-sync infrastructure for GitOps addon delivery from OCI registry
            examples:
              - cmd: k2s addons enable rollout fluxcd
                comment: Enable rollout with Flux CD in k2s
              - cmd: k2s addons enable rollout fluxcd --ingress nginx
                comment: Enable rollout with Flux CD and webhook ingress in k2s
              - cmd: k2s addons enable rollout fluxcd --addon-sync=false
                comment: Enable rollout with Flux CD without addon-sync infrastructure
          script:
            subPath: fluxcd/Enable.ps1
            parameterMappings:
              - cliFlagName: ingress
                scriptParameterName: Ingress
              - cliFlagName: addon-sync
                scriptParameterName: AddonSync
        disable:
          cli:
            examples:
              - cmd: k2s addons disable rollout fluxcd
                comment: Disable rollout Flux CD addon in k2s
          script:
            subPath: fluxcd/Disable.ps1