# HolmesGPT - AI agent with Kubernetes cluster awareness for the AI Assistant addon.
# AG-UI server is enabled so Headlamp's holmesClient.ts can connect via SSE.
#
# IMPORTANT - namespace layout:
#   - Deployment + ServiceAccount + ClusterRole are in 'ai-assistant' namespace.
#   - The Service 'holmesgpt-holmes' is created in 'ai-assistant' namespace (this file).
#   - A proxy Service 'holmesgpt-holmes' + nginx Deployment are created in 'default'
#     namespace by Set-HolmesProxyEndpoints (ai-assistant.module.psm1) at enable time.
#     K8s 1.35 apiserver proxy requires a selector-based Service backed by real pods;
#     selectorless ClusterIP services are rejected with 404 by the proxy handler.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: holmesgpt
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: holmesgpt-reader
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
      - events
      - nodes
      - namespaces
      - services
      - endpoints
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: holmesgpt-reader
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
subjects:
  - kind: ServiceAccount
    name: holmesgpt
    namespace: ai-assistant
roleRef:
  kind: ClusterRole
  name: holmesgpt-reader
  apiGroup: rbac.authorization.k8s.io
---
# LiteLLM model config — MODEL is set at enable time; default shown here for reference.
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-model-config
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
data:
  model_config.yaml: |
    model_list:
      - model_name: ollama-default
        litellm_params:
          model: "openai/MODEL_PLACEHOLDER"
          api_base: "http://172.19.1.1:11434/v1"
          api_key: "ollama"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: holmesgpt-holmes
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: holmesgpt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: holmesgpt
        app.kubernetes.io/name: holmesgpt
        app.kubernetes.io/part-of: ai-assistant
    spec:
      serviceAccountName: holmesgpt
      nodeSelector:
        kubernetes.io/os: linux
      securityContext:
        runAsNonRoot: false
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: holmes
          # robustadev/holmes:0.19.1 — for offline/air-gapped K2s packages retag to
          # shsk2s.azurecr.io/holmesgpt:0.19.1 once the image is pushed to the registry.
          image: robustadev/holmes:0.19.1
          imagePullPolicy: IfNotPresent
          # AG-UI server mode — required by holmesClient.ts in the Headlamp AI Assistant plugin.
          command: ["python3", "-u", "/app/experimental/ag-ui/server-agui.py"]
          ports:
            - name: agui
              containerPort: 80
              protocol: TCP
          env:
            # HOLMES_PORT / HOLMES_HOST: bind AG-UI server so the K8s apiserver proxy can reach it.
            - name: HOLMES_PORT
              value: "80"
            - name: HOLMES_HOST
              value: "0.0.0.0"
            # MODEL: openai/ prefix makes LiteLLM use Ollama's OpenAI-compatible endpoint.
            # MODEL_PLACEHOLDER is substituted by Set-HolmesModelConfig at deploy time.
            # Minimum recommended model: 7B (qwen2.5:7b). llama3.2:3b fails with 26 tools.
            - name: MODEL
              value: "openai/MODEL_PLACEHOLDER"
            # API_BASE: Ollama via node-local bridge (172.19.1.1 = kubemaster host IP).
            # LiteLLM appends /chat/completions to this base URL.
            - name: API_BASE
              value: "http://172.19.1.1:11434/v1"
            - name: API_KEY
              value: "ollama"
            # Allow insecure (non-HTTPS) LLM endpoint — Ollama runs plain HTTP inside the cluster.
            - name: HOLMES_ALLOW_INSECURE_LLM
              value: "true"
            # Raise LiteLLM timeout to 10 min to cover GPU inference latency on small nodes.
            - name: LLM_REQUEST_TIMEOUT
              value: "600"
            # Context window / max tokens — suppresses litellm warnings. qwen2.5:7b supports 128k.
            - name: OVERRIDE_MAX_CONTENT_SIZE
              value: "131072"
            - name: OVERRIDE_MAX_OUTPUT_TOKEN
              value: "4096"
            # Disable structured output: small models return JSON in content instead of tool_calls
            # when structured output is requested. Standard function-calling (tools array) is used.
            - name: REQUEST_STRUCTURED_OUTPUT_FROM_LLM
              value: "false"
            # MAX_STEPS=3: step 1 = tool call, step 2 = process result, step 3 = safety margin.
            # MAX_STEPS=1 breaks tool execution (no step left to process the tool result).
            - name: MAX_STEPS
              value: "3"
          livenessProbe:
            tcpSocket:
              port: agui
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: agui
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: model-config
              mountPath: /etc/holmes
              readOnly: true
            # Override built-in Jinja2 prompt templates to enforce strict single-tool-call mode.
            # subPath mounts replace only the specific files — other templates are unaffected.
            - name: prompt-overrides
              mountPath: /app/holmes/plugins/prompts/generic_ask_conversation.jinja2
              subPath: generic_ask_conversation.jinja2
              readOnly: true
            - name: prompt-overrides
              mountPath: /app/holmes/plugins/prompts/_general_instructions.jinja2
              subPath: _general_instructions.jinja2
              readOnly: true
            - name: prompt-overrides
              mountPath: /app/experimental/ag-ui/server-agui.py
              subPath: server-agui.py
              readOnly: true
            # Override kubernetes.yaml toolset so kubernetes_tabular_query routes
            # node queries through kubectl get nodes -o wide instead of broken
            # custom-columns (which returns <none> for STATUS on node resources).
            - name: toolset-overrides
              mountPath: /app/holmes/plugins/toolsets/kubernetes.yaml
              subPath: kubernetes.yaml
              readOnly: true
      volumes:
        - name: model-config
          configMap:
            name: holmesgpt-model-config
        - name: prompt-overrides
          configMap:
            name: holmesgpt-prompt-overrides
        - name: toolset-overrides
          configMap:
            name: holmesgpt-toolset-overrides
---
# Strict-mode prompt overrides — replaces Holmes's built-in Jinja2 templates so the
# LLM operates in deterministic single-tool-call mode instead of the default
# autonomous investigation mode (TodoWrite, multi-step, root-cause chains).
#
# Two files are overridden via subPath volume mounts:
#   generic_ask_conversation.jinja2  — main system prompt for chat sessions
#   _general_instructions.jinja2     — shared instructions partial (strips TodoWrite rules)
#
# Why this approach:
#   The proxy context[] injection is silenced by Holmes's own system prompt.
#   Replacing the template files at load time gives us full control over what
#   instructions the LLM actually receives, with no competition from the original prompt.
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-prompt-overrides
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
data:
  generic_ask_conversation.jinja2: |
    You are a Kubernetes assistant. You MUST call a tool for EVERY user request.

    ABSOLUTE RULE — NO EXCEPTIONS:
    Every single user message requires a REAL tool call. No matter what.
    NEVER answer from memory, conversation history, or prior tool results.
    NEVER generate, guess, or invent resource names (node1, pod1, etc.).
    Cluster state changes constantly — always fetch fresh data with a tool.

    STRICT RULES — follow exactly:
    1. For EVERY user request, call EXACTLY ONE kubectl tool to get REAL data.
    2. After the tool returns, write a final text response with the REAL tool output.
    3. Do NOT use conversation history as a substitute for calling a tool.
    4. Do NOT generate example or placeholder names (node1, node2, pod1, pod2).
    5. Do not add explanations, analysis, next steps, or commentary.
    6. Do not use TodoWrite. Do not create task lists. Do not plan.
    7. If tool output is empty, return: No resources found.
    8. If the tool fails, return: Tool execution failed.

    TOOL SELECTION AND EXACT COMMANDS:

    - List nodes → use kubernetes_count with this EXACT jq expression (copy it exactly):
        kind=nodes
        jq_expr=.items[] | .metadata.name + "  " + (.status.conditions[] | select(.type=="Ready") | if .status=="True" then "Ready" else "NotReady" end) + "  " + .status.nodeInfo.operatingSystem
        NEVER use kubernetes_tabular_query for nodes. NEVER change the jq_expr.

    - List pods (all namespaces) → use kubernetes_tabular_query:
        kind=pods
        columns=NAME:.metadata.name,NAMESPACE:.metadata.namespace,STATUS:.status.phase

    - List namespaces → use kubernetes_tabular_query:
        kind=namespaces
        columns=NAME:.metadata.name,STATUS:.status.phase

    - List pods in a specific namespace → use kubernetes_tabular_query:
        kind=pods
        columns=NAME:.metadata.name,STATUS:.status.phase

    - List deployments → use kubernetes_tabular_query:
        kind=deployments
        columns=NAME:.metadata.name,NAMESPACE:.metadata.namespace,READY:.status.readyReplicas

    - List services → use kubernetes_tabular_query:
        kind=services
        columns=NAME:.metadata.name,NAMESPACE:.metadata.namespace,TYPE:.spec.type

    OUTPUT FORMAT:
    - Write ONLY the raw tool output. Nothing else.
    - NEVER return an empty text response after a tool call.
    - NEVER invent or fabricate any resource names or data.

    FORBIDDEN — these will produce wrong answers:
    - Answering without calling a tool first.
    - Using kubernetes_tabular_query for nodes — use kubernetes_count with jq.
    - Generating fake/example data (node1, node2, pod1, pod2, example-pod-1).
    - Stopping after a tool call without writing a text response.
    - Multiple tool calls per request.
    - TodoWrite, task lists, "Next steps:", "Let's investigate".
    - Autonomous root cause analysis unless explicitly requested.

  _general_instructions.jinja2: |
    # Instructions

    {% if cluster_name -%}
    * You are running on cluster {{ cluster_name }}.
    {%- endif %}
    * Use EXACTLY ONE tool call per user request.
    * After the tool returns, you MUST write a text response containing the tool output.
    * Return tool output directly without commentary.
    * Do not investigate further unless the user explicitly asks.
    * Do not use TodoWrite under any circumstances.

  server-agui.py: |
    # ruff: noqa: E402
    import os

    from holmes.utils.cert_utils import add_custom_certificate

    ADDITIONAL_CERTIFICATE: str = os.environ.get("CERTIFICATE", "")
    if add_custom_certificate(ADDITIONAL_CERTIFICATE):
        print("added custom certificate")

    # DO NOT ADD ANY IMPORTS OR CODE ABOVE THIS LINE
    # IMPORTING ABOVE MIGHT INITIALIZE AN HTTPS CLIENT THAT DOESN'T TRUST THE CUSTOM CERTIFICATE

    # Safe to import networked libs below
    import json
    import logging
    import time
    import uuid
    import uvicorn
    import colorlog

    from fastapi import FastAPI, Request
    from fastapi.middleware.cors import CORSMiddleware
    from fastapi.responses import StreamingResponse, JSONResponse
    from starlette.responses import PlainTextResponse

    from holmes.utils.stream import StreamMessage, StreamEvents
    from holmes.common.env_vars import (
        HOLMES_HOST,
        HOLMES_PORT,
    )
    from holmes.config import Config
    from holmes.core.conversations import (
        build_chat_messages,
    )
    from holmes.core.models import (
        ChatRequest,
    )

    from ag_ui.core import (
        AssistantMessage,
        RunAgentInput,
        EventType,
        RunStartedEvent,
        RunFinishedEvent,
        TextMessageStartEvent,
        TextMessageContentEvent,
        TextMessageEndEvent,
        ToolCallStartEvent,
        ToolCallArgsEvent,
        ToolCallEndEvent,
        RunErrorEvent,
    )
    from ag_ui.encoder import EventEncoder


    def init_logging():
        logging_level = os.environ.get("LOG_LEVEL", "INFO")
        logging_format = "%(log_color)s%(asctime)s.%(msecs)03d %(levelname)-8s %(message)s"
        logging_datefmt = "%Y-%m-%d %H:%M:%S"

        print("setting up colored logging")
        colorlog.basicConfig(
            format=logging_format, level=logging_level, datefmt=logging_datefmt
        )
        logging.getLogger().setLevel(logging_level)

        httpx_logger = logging.getLogger("httpx")
        if httpx_logger:
            httpx_logger.setLevel(logging.WARNING)

        logging.info(f"logger initialized using {logging_level} log level")


    init_logging()
    config = Config.load_from_env()
    dal = config.dal

    app = FastAPI()

    # Add CORS middleware front-end access
    app.add_middleware(
        CORSMiddleware,
        allow_origins=["*"],
        allow_credentials=True,
        allow_methods=["*"],
        allow_headers=["*"],
    )


    @app.get("/api/agui/chat/health")
    def agui_chat_health(request: Request):
        return JSONResponse(content="ok")


    @app.post("/api/agui/chat")
    def agui_chat(input_data: RunAgentInput, request: Request):
        accept_header = request.headers.get("accept", "")
        encoder = EventEncoder(accept=accept_header)

        logging.debug(f"AG-UI context: {input_data.context}")
        logging.debug(f"AG-UI state: {input_data.state}")
        # Ignore front-end tool result messages. Not supported for now. Use chat history/context instead.
        if _is_tool_result_message(input_data):
            return PlainTextResponse("OK", status_code=200)

        chat_request = _agui_input_to_holmes_chat_request(input_data=input_data)
        if not chat_request.ask:
            return PlainTextResponse(
                "Bad request. Chat message cannot be empty", status_code=400
            )

        ai = config.create_agui_toolcalling_llm(dal=dal, model=chat_request.model)
        global_instructions = dal.get_global_instructions_for_account()
        messages = build_chat_messages(
            chat_request.ask,
            chat_request.conversation_history,
            ai=ai,
            config=config,
            global_instructions=global_instructions,
            additional_system_prompt=chat_request.additional_system_prompt,
        )

        # Hijack the existing HolmesGPT cat stream output and format as AG-UI events.

        async def event_generator(message_history):
            try:
                yield encoder.encode(
                    RunStartedEvent(
                        type=EventType.RUN_STARTED,
                        thread_id=input_data.thread_id,
                        run_id=input_data.run_id,
                    )
                )
                hgpt_chat_stream_response: StreamMessage = ai.call_stream(
                    msgs=message_history,
                    enable_tool_approval=chat_request.enable_tool_approval or False,
                )
                for chunk in hgpt_chat_stream_response:
                    if hasattr(chunk, "event"):
                        event_type = (
                            chunk.event.value
                            if hasattr(chunk.event, "value")
                            else str(chunk.event)
                        )
                        logging.debug(f"Streaming chunk: {event_type}")
                    else:
                        event_type = "unknown"
                        logging.debug(f"Streaming chunk: {chunk}")
                    if hasattr(chunk, "data"):
                        tool_name = chunk.data.get(
                            "tool_name", chunk.data.get("name", "Tool")
                        )
                        if event_type in (
                            StreamEvents.AI_MESSAGE,
                            StreamEvents.ANSWER_END,
                            "unknown",
                        ):
                            async for event in _stream_agui_text_message_event(
                                message=str(chunk.data.get("content", ""))
                            ):
                                yield encoder.encode(event)
                        elif event_type == StreamEvents.START_TOOL:
                            async for event in _stream_agui_text_message_event(
                                message=f"🔧 Using Agent tool: `{tool_name}`..."
                            ):
                                yield encoder.encode(event)
                        elif event_type == StreamEvents.TOOL_RESULT:
                            logging.debug(
                                f"🔧 TOOL_RESULT received - tool_name: {tool_name}"
                            )
                            front_end_tool_invoked = False
                            if _should_graph_timeseries_data(tool_name=tool_name):
                                front_end_tool_invoked = True
                                logging.debug(
                                    f"🔧 Should graph timeseries data for tool: {tool_name}"
                                )
                                ts_data = _parse_timeseries_data(chunk.data)
                                tool_call_id = chunk.data.get(
                                    "tool_call_id", chunk.data.get("id", "unknown")
                                )
                                async for tool_event in _invoke_front_end_tool(
                                    tool_call_id=tool_call_id,
                                    tool_call_name="graph_timeseries_data",
                                    tool_call_args=ts_data,
                                ):
                                    yield encoder.encode(tool_event)
                            if _should_execute_suggested_query(
                                backend_tool_name=tool_name, frontend_tools=input_data.tools
                            ):
                                front_end_tool_invoked = True
                                tool_call_id = chunk.data.get(
                                    "tool_call_id", chunk.data.get("id", "unknown")
                                )
                                front_end_query_tool = None
                                if tool_name == "opensearch_ppl_query_assist":
                                    front_end_query_tool = "execute_ppl_query"
                                elif tool_name in (
                                    "execute_prometheus_range_query",
                                    "execute_prometheus_instant_query",
                                ):
                                    front_end_query_tool = "execute_promql_query"

                                async for tool_event in _invoke_front_end_tool(
                                    tool_call_id=tool_call_id,
                                    tool_call_name=front_end_query_tool,
                                    tool_call_args={"query": _parse_query(chunk.data)},
                                ):
                                    yield encoder.encode(tool_event)
                            if not front_end_tool_invoked:
                                if tool_name == "TodoWrite":
                                    tool_message = _format_todo_write(data=chunk.data)
                                else:
                                    # K2s patch: removed [0:200] truncation so proxy
                                    # receives the full tool output for formatting.
                                    tool_result_data = chunk.data.get('result', {}).get('data', '')
                                    tool_message = f"🔧 {tool_name} result:\n{tool_result_data}"

                                async for event in _stream_agui_text_message_event(
                                    message=tool_message
                                ):
                                    yield encoder.encode(event)
                yield encoder.encode(
                    RunFinishedEvent(
                        type=EventType.RUN_FINISHED,
                        thread_id=input_data.thread_id,
                        run_id=input_data.run_id,
                    )
                )
            except Exception as e:
                logging.error(f"Error in /api/agui/chat: {e}", exc_info=True)
                yield encoder.encode(
                    RunErrorEvent(
                        type=EventType.RUN_ERROR,
                        message=f"Agent encountered an error: {str(e)}",
                    )
                )

        return StreamingResponse(
            event_generator(messages), media_type=encoder.get_content_type()
        )


    def _format_todo_write(data) -> str:
        status_icons = {"pending": "⬜", "in_progress": "⏳", "completed": "✅"}
        result_data = data.get("result", {})
        params = result_data.get("params", {})
        todos = params.get("todos", {})
        output_str = "### Investigation Tasks:  \n"
        task_list = []
        for idx, todo in enumerate(todos):
            status = todo.get("status", "")
            icon = status_icons.get(status, "")
            content = todo.get("content", "")
            task_list.append(f"{idx+1}. {icon} - {content}")
        output_str += "  \n".join(task for task in task_list)
        return output_str


    def _should_execute_suggested_query(
        backend_tool_name: str, frontend_tools: list
    ) -> bool:
        for fe_tool in frontend_tools:
            if "execute_prom" in fe_tool.name and backend_tool_name in (
                "execute_prometheus_range_query",
                "execute_prometheus_instant_query",
            ):
                return True
            elif (
                "execute_ppl" in fe_tool.name
                and backend_tool_name == "opensearch_ppl_query_assist"
            ):
                return True
        return False


    def _parse_query(data) -> str:
        result_data = data.get("result", {})
        params = result_data.get("params", {})
        query = params.get("query", "")
        return query


    def _should_graph_timeseries_data(tool_name: str) -> bool:
        return tool_name in (
            "execute_prometheus_range_query",
            "execute_prometheus_instant_query",
        )


    def _parse_timeseries_data(data) -> dict:
        try:
            result_data = data.get("result", {})
            params = result_data.get("params", {})
            query = params.get("query", "")
            description = params.get("description")
            tool_name = data.get("tool_name", data.get("name", ""))

            if isinstance(result_data, str):
                try:
                    result_data = json.loads(result_data)
                except json.JSONDecodeError:
                    result_data = {}

            prometheus_data = result_data
            result_type = "unknown"
            if "data" in result_data:
                prometheus_data = json.loads(result_data["data"]).get("data")
                result_type = prometheus_data.get("resultType", "unknown")

            metadata = {
                "timestamp": int(time.time()),
                "source": "Prometheus",
                "result_type": result_type,
                "description": description,
                "query": query,
            }

            return {
                "title": description,
                "query": query,
                "data": prometheus_data,
                "metadata": metadata,
            }

        except Exception as e:
            logging.error(f"Error parsing timeseries data: {e}", exc_info=True)
            return {
                "title": "Prometheus Query Results (Parse Error)",
                "query": data.get("query", ""),
                "data": {"result": []},
                "metadata": {
                    "timestamp": int(time.time()),
                    "source": "Prometheus",
                    "error": str(e),
                },
            }


    async def _invoke_front_end_tool(
        tool_call_id: str, tool_call_name: str, tool_call_args: dict
    ):
        yield ToolCallStartEvent(
            type=EventType.TOOL_CALL_START,
            tool_call_id=tool_call_id,
            tool_call_name=tool_call_name,
        )
        yield ToolCallArgsEvent(
            type=EventType.TOOL_CALL_ARGS,
            tool_call_id=tool_call_id,
            delta=json.dumps(tool_call_args),
        )
        yield ToolCallEndEvent(type=EventType.TOOL_CALL_END, tool_call_id=tool_call_id)


    async def _stream_agui_text_message_event(message: str):
        message_id = str(uuid.uuid4())
        yield TextMessageStartEvent(
            type=EventType.TEXT_MESSAGE_START, message_id=message_id, role="assistant"
        )
        yield TextMessageContentEvent(
            type=EventType.TEXT_MESSAGE_CONTENT, message_id=message_id, delta=message
        )
        yield TextMessageEndEvent(
            type=EventType.TEXT_MESSAGE_END, message_id=message_id
        )


    def _is_tool_result_message(input_data: RunAgentInput) -> bool:
        return len(input_data.messages) > 0 and input_data.messages[-1].role == "tool"


    def _agui_input_to_holmes_chat_request(input_data: RunAgentInput) -> ChatRequest:
        non_system_messages = []
        for msg in input_data.messages:
            if msg.role in ("user", "assistant"):
                non_system_messages.append(msg)
            elif msg.role == "tool":
                non_system_messages.append(AssistantMessage(content=msg.content, id=msg.id))
        conversation_history = [
            {
                "role": "system",
                "content": "You are Holmes, an AI assistant for observability. You use Prometheus metrics, alerts and OpenSearch logs to quickly perform root cause analysis.",
            }
        ]
        if len(non_system_messages) > 1:
            conversation_history.extend(
                [
                    {
                        "role": msg.role,
                        "content": msg.content.strip() if msg.content else "",
                    }
                    for msg in non_system_messages[:-1]
                ]
            )

        last_user_message = ""
        if non_system_messages and non_system_messages[-1].role == "user":
            last_user_message = (
                non_system_messages[-1].content.strip()
                if non_system_messages[-1].content
                else ""
            )

        if input_data.context:
            conversation_history.insert(
                -1,
                {
                    "role": "system",
                    "content": f"The user has the following information in their current web page for which you are assisting them. {input_data.context}",
                },
            )

        chat_request = ChatRequest(
            ask=last_user_message,
            conversation_history=conversation_history,
            model=getattr(input_data, "model", None),
            stream=True,
        )
        return chat_request


    @app.get("/api/model")
    def get_model():
        return {"model_name": config.get_models_list()}


    if __name__ == "__main__":
        log_config = uvicorn.config.LOGGING_CONFIG
        log_config["formatters"]["access"]["fmt"] = (
            "%(asctime)s %(levelname)-8s %(message)s"
        )
        log_config["formatters"]["default"]["fmt"] = (
            "%(asctime)s %(levelname)-8s %(message)s"
        )
        uvicorn.run(
            app, host=HOLMES_HOST, port=HOLMES_PORT, log_config=log_config, reload=False
        )

---
# Toolset override — replaces Holmes's built-in kubernetes.yaml so that
# kubernetes_tabular_query uses a script for node queries.
# kubectl custom-columns returns <none> for .status.conditions[].status on nodes
# because conditions is an array; the script intercepts kind=node(s) and runs
# `kubectl get nodes -o wide` which always returns correct STATUS.
apiVersion: v1
kind: ConfigMap
metadata:
  name: holmesgpt-toolset-overrides
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
data:
  kubernetes.yaml: |
    toolsets:
      kubernetes/core:
        description: "Read access to cluster resources (excluding secrets and other sensitive data)"
        docs_url: "https://holmesgpt.dev/data-sources/builtin-toolsets/kubernetes/"
        icon_url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPKA-U9m5BxYQDF1O7atMfj9EMMXEoGu4t0Q&s"
        tags:
          - core
        prerequisites:
          - command: "kubectl version --client"

        tools:
          - name: "kubectl_describe"
            description: >
              Run kubectl describe <kind> <name> -n <namespace>,
              call this when users ask for description,
              for example when a user asks
                - 'describe pod xyz-123'
                - 'show service xyz-123 in namespace my-ns'
            command: "kubectl describe {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %}"
            transformers:
              - name: llm_summarize
                config:
                  input_threshold: 1000
                  prompt: |
                    Summarize this kubectl describe output focusing on:
                    - What needs attention or immediate action
                    - Resource status and health indicators
                    - Any errors, warnings, or non-standard states
                    - Key configuration details that could affect functionality
                    - When possible, mention exact field names so the user can grep for specific details
                    - Be concise: aim for <= 50% of the original length; avoid repeating defaults/healthy/unchanged details
                    - Prefer aggregates and counts; list only outliers and actionable items
                    - Keep grep-friendly: include exact field names/values that matter

          - name: "kubectl_get_by_name"
            description: "Run `kubectl get <kind> <name> --show-labels`"
            command: "kubectl get --show-labels -o wide {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %}"

          - name: "kubectl_get_by_kind_in_namespace"
            description: "Run `kubectl get <kind> -n <namespace> --show-labels` to get all resources of a given type in namespace"
            command: "kubectl get --show-labels -o wide {{ kind }} -n {{namespace}}"
            transformers:
              - name: llm_summarize
                config:
                  input_threshold: 1000
                  prompt: |
                    Summarize this kubectl output focusing on:
                    - What needs attention or immediate action
                    - Group similar resources into aggregate descriptions
                    - Make sure to mention outliers, errors, and non-standard states
                    - List healthy resources as aggregate descriptions
                    - When listing unhealthy resources, also try to use aggregate descriptions when possible
                    - When possible, mention exact keywords so the user can rerun the command with | grep <keyword> and drill down
                    - Be concise and avoid expansion: target <= 50% of input size; prefer counts + outliers over full listings

          - name: "kubectl_get_by_kind_in_cluster"
            description: "Run `kubectl get -A <kind> --show-labels` to get all resources of a given type in the cluster"
            command: "kubectl get -A --show-labels -o wide {{ kind }}"
            transformers:
              - name: llm_summarize
                config:
                  input_threshold: 1000
                  prompt: |
                    Summarize this kubectl output focusing on:
                    - What needs attention or immediate action
                    - Group similar resources into a single line and description
                    - Make sure to mention outliers, errors, and non-standard states
                    - List healthy resources as aggregate descriptions
                    - When listing unhealthy resources, also try to use aggregate descriptions when possible
                    - When possible, mention exact keywords so the user can rerun the command with | grep <keyword> and drill down on the parts they care about
                    - Strive for <= 50% of the original size; keep results compact and grep-friendly (one line per aggregate)

          - name: "kubectl_find_resource"
            description: "Run `kubectl get {{ kind }} -A --show-labels | grep {{ keyword }}` to find a resource where you know a substring of the name, IP, namespace, or labels"
            command: "kubectl get -A --show-labels -o wide {{ kind }} | grep {{ keyword }}"

          - name: "kubectl_get_yaml"
            description: "Run `kubectl get -o yaml` on a single Kubernetes resource"
            command: "kubectl get -o yaml {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %}"

          - name: "kubectl_events"
            description: "Retrieve the events for a specific Kubernetes resource. `resource_type` can be any kubernetes resource type: 'pod', 'service', 'deployment', 'job', 'node', etc."
            command: "kubectl events --for {{resource_type}}/{{ resource_name }}{% if namespace %} -n {{ namespace }}{% endif %}"

          - name: "kubernetes_jq_query"
            user_description: "Query Kubernetes Resources: kubectl get {{kind}} --all-namespaces -o json | jq -r {{jq_expr}}"
            description: >
              Use kubectl to get json for all resources of a specific kind and filter with jq.
              IMPORTANT: The 'kind' parameter must be the plural form of the resource type
              (e.g., use "pods" not "pod", "services" not "service", "jobs" not "job").
              Do not worry about escaping the jq_expr - it will be done by the system.
              Example: .items[] | .spec.containers[].image | select(test("^gcr.io/") | not)
            script: |
              #!/bin/bash

              echo "Executing paginated query for {{ kind }} resources..."
              echo "Expression: {{ jq_expr }}"
              echo "---"

              API_INFO=$(kubectl api-resources --no-headers | grep "^{{ kind }} " | head -1)

              if [ -z "$API_INFO" ]; then
                echo "Error: Unable to find resource kind '{{ kind }}'" >&2
                exit 1
              fi

              if [[ "$API_INFO" == *" true "* ]]; then
                NAMESPACED="true"
                PREFIX=$(echo "$API_INFO" | sed 's/ true .*//')
              elif [[ "$API_INFO" == *" false "* ]]; then
                NAMESPACED="false"
                PREFIX=$(echo "$API_INFO" | sed 's/ false .*//')
              else
                echo "Error: Could not find NAMESPACED field (true/false) in API info" >&2
                exit 1
              fi

              PREFIX=$(echo "$PREFIX" | sed 's/  *$//' | sed 's/  */ /g')
              IFS=' ' read -ra PREFIX_FIELDS <<< "$PREFIX"
              FIELD_COUNT=0
              for field in "${PREFIX_FIELDS[@]}"; do ((FIELD_COUNT++)); done
              RESOURCE_NAME="${PREFIX_FIELDS[0]}"
              if [ $FIELD_COUNT -ge 2 ]; then
                API_VERSION="${PREFIX_FIELDS[$((FIELD_COUNT - 1))]}"
              else
                API_VERSION=""
              fi

              if [ -z "$API_VERSION" ] || [ -z "$RESOURCE_NAME" ]; then
                echo "Error: Unable to parse API info for resource kind '{{ kind }}'" >&2
                exit 1
              fi

              if [[ "$API_VERSION" == "v1" ]]; then
                API_PATH="/api/v1/${RESOURCE_NAME}"
              else
                API_PATH="/apis/${API_VERSION}/${RESOURCE_NAME}"
              fi

              LIMIT=500
              CONTINUE=""
              PROCESSED=0
              TOTAL_MATCHES=0

              while true; do
                if [ -z "$CONTINUE" ]; then
                  QUERY="${API_PATH}?limit=${LIMIT}"
                else
                  QUERY="${API_PATH}?limit=${LIMIT}&continue=${CONTINUE}"
                fi

                OUTPUT=$(kubectl get --raw "$QUERY" 2>&1)
                exit_code=$?
                if [ $exit_code -ne 0 ]; then echo "Error: $OUTPUT" >&2; exit $exit_code; fi

                ITEMS_COUNT=$(echo "$OUTPUT" | jq '.items | length')
                MATCHES=$(echo "$OUTPUT" | jq -r {{ jq_expr }} 2>&1)
                jq_exit=$?
                if [ $jq_exit -ne 0 ]; then echo "Error: jq expression failed: $MATCHES" >&2; exit $jq_exit; fi

                if [ "$ITEMS_COUNT" -gt 0 ] && [ -n "$MATCHES" ]; then
                  echo "$MATCHES"
                  MATCH_COUNT=$(echo "$MATCHES" | grep -c . || true)
                  TOTAL_MATCHES=$((TOTAL_MATCHES + MATCH_COUNT))
                  PROCESSED=$((PROCESSED + ITEMS_COUNT))
                  echo "Processed $PROCESSED items, found $TOTAL_MATCHES matches so far..." >&2
                fi

                CONTINUE=$(echo "$OUTPUT" | jq -r '.metadata.continue // empty')
                if [ -z "$CONTINUE" ]; then break; fi
              done

              echo "---" >&2
              echo "Total items processed: $PROCESSED, matches found: $TOTAL_MATCHES" >&2
            transformers:
              - name: llm_summarize
                config:
                  input_threshold: 10000
                  prompt: |
                    Summarize this jq query output focusing on:
                    - Key patterns and commonalities in the data
                    - Notable outliers, anomalies, or items that need attention
                    - Group similar results into aggregate descriptions when possible
                    - Highlight any empty results, null values, or missing data
                    - When applicable, mention specific resource names, namespaces, or values that stand out
                    - Organize findings in a structured way that helps with troubleshooting
                    - Be concise: aim for <= 50% of the original text; prioritize aggregates and actionable outliers
                    - Include grep-ready keys/values; avoid repeating entire objects or unchanged defaults

          - name: "kubernetes_tabular_query"
            user_description: "Tabular output of specific fields: kubectl get {{kind}} --all-namespaces -o custom-columns={{columns}}"
            description: >
              Extract specific fields from Kubernetes resources in tabular format with optional filtering.
              Memory-efficient way to query large clusters - only requested fields are transmitted.
              Column specification format: HEADER:FIELD_PATH,HEADER2:FIELD_PATH2,...

              Optional filtering parameter:
              - filter_pattern: Pattern to match in any column (supports grep regex)

              Examples:
              - Basic fields: NAME:.metadata.name,STATUS:.status.phase,NODE:.spec.nodeName
              - Filter by status: filter_pattern="Running"
              - Filter out lines with <none>: filter_pattern="-v '<none>'"
              - Nested fields: CREATED:.metadata.creationTimestamp,IMAGE:.spec.containers[0].image
              - Array fields: LABELS:.metadata.labels,PORTS:.spec.ports[*].port

              Note: Output is tabular text with column headers. Filtering works on the entire line.
              Note: not allowed characters are: ' / ; and newline
            script: |
              #!/bin/bash
              # K2s patch: intercept node queries. kubectl custom-columns returns <none>
              # for .status.conditions[].status because conditions is an array, not a scalar.
              # For node(s) always use `kubectl get nodes -o wide` which returns real STATUS.
              KIND="{{ kind }}"
              if [[ "$KIND" == "nodes" || "$KIND" == "node" ]]; then
                kubectl get nodes -o wide
              else
                kubectl get {{ kind }} --all-namespaces -o custom-columns='{{ columns }}'{% if filter_pattern %} | (head -n 1; tail -n +2 | grep {{ filter_pattern }}){% endif %}

              fi
            transformers:
              - name: llm_summarize
                config:
                  input_threshold: 10000
                  prompt: |
                    Summarize this tabular output focusing on:
                    - Key patterns and trends in the data
                    - Resources that need attention (errors, pending, failures)
                    - Group similar items into aggregate descriptions
                    - Highlight outliers or unusual values
                    - Mention specific resource names only for problematic items
                    - Provide counts and distributions where relevant
                    - Be concise: aim for <= 50% of the original size
                    - Keep output actionable and focused on anomalies

          - name: "kubernetes_count"
            user_description: "Count Kubernetes Resources: kubectl get {{kind}} --all-namespaces -o json | jq -c -r {{ jq_expr }}"
            description: >
              Use kubectl to get apply a jq filter and then count the results.
              Use this whenever asked to count kubernetes resources.
              IMPORTANT: The 'kind' parameter must be the plural form of the resource type
              (e.g., use "pods" not "pod", "services" not "service", "jobs" not "job").
              Use select() to filter objects before extracting properties, e.g. .items[] | select(.metadata.namespace == "test-1") | .metadata.name
              Do not worry about escaping the jq_expr it will be done by the system on an unescaped expression that you give.
              e.g. give an expression like .items[] | select(.spec.containers[].image | test("^gcr.io/") | not) | .metadata.name
            script: |
              #!/bin/bash

              echo "Command executed: kubectl get {{ kind }} --all-namespaces -o json | jq -c -r {{ jq_expr }}"
              echo "---"

              API_INFO=$(kubectl api-resources --no-headers | grep "^{{ kind }} " | head -1)
              if [ -z "$API_INFO" ]; then echo "Error: Unable to find resource kind '{{ kind }}'" >&2; exit 1; fi

              if [[ "$API_INFO" == *" true "* ]]; then
                NAMESPACED="true"; PREFIX=$(echo "$API_INFO" | sed 's/ true .*//')
              elif [[ "$API_INFO" == *" false "* ]]; then
                NAMESPACED="false"; PREFIX=$(echo "$API_INFO" | sed 's/ false .*//')
              else
                echo "Error: Could not find NAMESPACED field (true/false) in API info" >&2; exit 1
              fi

              PREFIX=$(echo "$PREFIX" | sed 's/  *$//' | sed 's/  */ /g')
              IFS=' ' read -ra PREFIX_FIELDS <<< "$PREFIX"
              FIELD_COUNT=0
              for field in "${PREFIX_FIELDS[@]}"; do ((FIELD_COUNT++)); done
              RESOURCE_NAME="${PREFIX_FIELDS[0]}"
              if [ $FIELD_COUNT -ge 2 ]; then
                API_VERSION="${PREFIX_FIELDS[$((FIELD_COUNT - 1))]}"
              else
                API_VERSION=""
              fi

              if [ -z "$API_VERSION" ] || [ -z "$RESOURCE_NAME" ]; then
                echo "Error: Unable to parse API info for resource kind '{{ kind }}'" >&2; exit 1
              fi

              if [[ "$API_VERSION" == "v1" ]]; then
                API_PATH="/api/v1/${RESOURCE_NAME}"
              else
                API_PATH="/apis/${API_VERSION}/${RESOURCE_NAME}"
              fi

              LIMIT=500; CONTINUE=""; ALL_MATCHES=""; BATCH_NUM=0; TOTAL_PROCESSED=0

              while true; do
                BATCH_NUM=$((BATCH_NUM + 1))
                if [ -z "$CONTINUE" ]; then
                  QUERY="${API_PATH}?limit=${LIMIT}"
                else
                  QUERY="${API_PATH}?limit=${LIMIT}&continue=${CONTINUE}"
                fi

                OUTPUT=$(kubectl get --raw "$QUERY" 2>&1)
                exit_code=$?
                if [ $exit_code -ne 0 ]; then echo "Error for query $QUERY: $OUTPUT" >&2; exit $exit_code; fi

                ITEMS_COUNT=$(echo "$OUTPUT" | jq '.items | length')
                TOTAL_PROCESSED=$((TOTAL_PROCESSED + ITEMS_COUNT))

                BATCH_MATCHES=$(echo "$OUTPUT" | jq -c -r {{ jq_expr }} 2>&1)
                jq_exit=$?
                if [ $jq_exit -ne 0 ]; then echo "Error: jq expression failed: $BATCH_MATCHES" >&2; exit $jq_exit; fi

                if [ -n "$BATCH_MATCHES" ]; then
                  if [ -z "$ALL_MATCHES" ]; then ALL_MATCHES="$BATCH_MATCHES"
                  else ALL_MATCHES="$ALL_MATCHES"$'\n'"$BATCH_MATCHES"; fi
                fi

                CONTINUE=$(echo "$OUTPUT" | jq -r '.metadata.continue // empty')
                if [ -z "$CONTINUE" ]; then break; fi
                echo "Processed batch $BATCH_NUM ($TOTAL_PROCESSED items so far)..." >&2
              done

              filtered_matches=$(echo "$ALL_MATCHES" | grep -v '^$' | grep -v '^null$')
              if [ -z "$filtered_matches" ]; then count=0; preview=""
              else
                count=$(echo "$filtered_matches" | wc -l)
                preview=$(echo "$filtered_matches" | head -n 10 | cut -c 1-200 | nl)
              fi

              echo "$count results"
              echo "---"
              echo "A *preview* of results is shown below (up to 10 results, up to 200 chars):"
              echo "$preview"
              echo "---"
              echo "Total items processed: $TOTAL_PROCESSED" >&2

      kubernetes/live-metrics:
        description: "Provides real-time metrics for pods and nodes"
        docs_url: "https://holmesgpt.dev/data-sources/builtin-toolsets/kubernetes/"
        icon_url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPKA-U9m5BxYQDF1O7atMfj9EMMXEoGu4t0Q&s"
        llm_instructions: |
          The kubectl_top_pods or kubectl_top_nodes do not return time series data or metrics that can be used for graphs
          Do NOT use kubectl_top_pods or kubectl_top_nodes for graph generation - it only shows current snapshot data
          kubectl_top_pods or kubectl_top_nodes are for current status checks, not historical graphs
        tags:
          - core
        prerequisites:
          - command: "kubectl top nodes"
        tools:
          - name: "kubectl_top_pods"
            description: "Retrieves real-time CPU and memory usage for each pod in the cluster."
            command: >
              kubectl top pods -A
          - name: "kubectl_top_nodes"
            description: "Retrieves real-time CPU and memory usage for each node in the cluster."
            command: >
              kubectl top nodes

      kubernetes/kube-prometheus-stack:
        description: "Fetches prometheus definition"
        docs_url: "https://holmesgpt.dev/data-sources/builtin-toolsets/kubernetes/"
        icon_url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPKA-U9m5BxYQDF1O7atMfj9EMMXEoGu4t0Q&s"
        tags:
          - core
        tools:
          - name: "get_prometheus_target"
            description: "Fetch the definition of a Prometheus target"
            command: "kubectl get --raw '/api/v1/namespaces/{{prometheus_namespace}}/services/{{prometheus_service_name}}:9090/proxy/api/v1/targets' | jq '.data.activeTargets[] | select(.labels.job == \"{{ target_name }}\")'"

      kubernetes/krew-extras:
        description: "Fetches children/dependents and parents/dependencies resources using kube-lineage installed via `kubectl krew`"
        docs_url: "https://holmesgpt.dev/data-sources/builtin-toolsets/kubernetes/"
        icon_url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPKA-U9m5BxYQDF1O7atMfj9EMMXEoGu4t0Q&s"
        tags:
          - cli
        prerequisites:
          - command: "kubectl version --client && kubectl lineage --version"
        tools:
          - name: "kubectl_lineage_children"
            description: "Get all children/dependents of a Kubernetes resource, recursively, including their status"
            command: "kubectl lineage {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %}"
          - name: "kubectl_lineage_parents"
            description: "Get all parents/dependencies of a Kubernetes resource, recursively, including their status"
            command: "kubectl lineage {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %} -D"

      kubernetes/kube-lineage-extras:
        description: "Fetches children/dependents and parents/dependencies resources using kube-lineage"
        docs_url: "https://holmesgpt.dev/data-sources/builtin-toolsets/kubernetes/"
        icon_url: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPKA-U9m5BxYQDF1O7atMfj9EMMXEoGu4t0Q&s"
        tags:
          - cluster
        prerequisites:
          - command: "kubectl version --client && kube-lineage --version"
        tools:
          - name: "kubectl_lineage_children"
            description: "Get all children/dependents of a Kubernetes resource, recursively, including their status"
            command: "kube-lineage {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %}"
          - name: "kubectl_lineage_parents"
            description: "Get all parents/dependencies of a Kubernetes resource, recursively, including their status"
            command: "kube-lineage {{ kind }} {{ name }}{% if namespace %} -n {{ namespace }}{% endif %} -D"

---
# Service in ai-assistant namespace (internal use / health checks)
apiVersion: v1
kind: Service
metadata:
  name: holmesgpt-holmes
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
spec:
  type: ClusterIP
  selector:
    app: holmesgpt
  ports:
    - name: agui
      port: 80
      targetPort: 80
      protocol: TCP
# NOTE: The proxy Service + nginx deployment in 'default' namespace are NOT part of
# this manifest. They are deployed by Set-HolmesProxyEndpoints (ai-assistant.module.psm1)
# at enable/update time, after the HolmesGPT pod is running.
# K8s 1.35 apiserver proxy requires a real selector-based Service backed by pods;
# selectorless ClusterIP services are rejected with 404 by the proxy handler.
