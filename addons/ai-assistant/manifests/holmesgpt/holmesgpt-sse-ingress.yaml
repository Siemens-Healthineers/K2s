# SSE Direct-Route Ingress for HolmesGPT
#
# PURPOSE
#   The Headlamp AI Assistant plugin communicates with HolmesGPT via
#   Server-Sent Events (SSE). The default path through:
#     ingress-nginx → Headlamp backend → K8s apiserver proxy → HolmesGPT
#   breaks SSE streaming because the K8s apiserver service proxy buffers the
#   entire response body before forwarding it.
#
#   This Ingress intercepts the HolmesGPT proxy path at the ingress-nginx layer
#   and routes it through the Python smart-proxy (holmesgpt-proxy-bridge →
#   holmesgpt-holmes.default), which injects the strict system prompt before
#   forwarding to the real HolmesGPT pod.
#
# PATH PATTERN (ImplementationSpecific regex)
#   /dashboard/clusters/[^/]+/api/v1/namespaces/default/services/holmesgpt-holmes:80/proxy(/|$)(.*)
#
#   - /dashboard        — Headlamp base URL (from -base-url=/dashboard arg)
#   - /clusters/[^/]+   — any Headlamp cluster name (default K2s: "main")
#   - /proxy(/|$)(.*)   — captures the sub-path; rewrite-target strips the
#                         Headlamp prefix and forwards only /$2 to HolmesGPT
#
# SSE ANNOTATIONS
#   proxy-buffering off + proxy-http-version 1.1 + X-Accel-Buffering no
#   ensure nginx does not buffer the SSE event stream.
#
# BACKEND
#   Routes to holmesgpt-proxy-bridge (ExternalName → holmesgpt-holmes.default).
#   The Python proxy in 'default' injects the strict system prompt into every
#   POST /api/agui/chat request and filters empty SSE delta chunks.
---
# ExternalName Service that bridges the ai-assistant Ingress to the Python proxy
# in the 'default' namespace.  The SSE ingress routes to this service so that
# all /api/agui/chat requests (including streamed SSE responses) pass through the
# strict-mode proxy which injects additional_system_prompt before forwarding to
# the real HolmesGPT pod.
apiVersion: v1
kind: Service
metadata:
  name: holmesgpt-proxy-bridge
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  type: ExternalName
  externalName: holmesgpt-holmes.default.svc.cluster.local
  ports:
    - name: agui
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: holmesgpt-sse-direct
  namespace: ai-assistant
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
  annotations:
    # Strip the Headlamp path prefix; forward only the Holmes sub-path to the proxy.
    # Capture group $2 is the part after /proxy — e.g. "api/agui/chat".
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"

    # ── SSE streaming — critical for HolmesGPT AG-UI event stream ────────────
    # Disable nginx response buffering so SSE events flush to the browser immediately.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # Keep connections alive long enough for slow LLM inference (up to 10 min).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # HTTP/1.1 required for chunked transfer / SSE keep-alive.
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Suppress any upstream X-Accel-Buffering that might re-enable buffering,
    # and clear the Connection header so upstream keep-alive works correctly.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Connection "";
      add_header X-Accel-Buffering no always;
spec:
  ingressClassName: nginx
  rules:
    - host: k2s.cluster.local
      http:
        paths:
          # Regex path — ImplementationSpecific lets ingress-nginx treat it as a
          # location regex. [^/]+ matches any cluster name, not just "main".
          - path: /dashboard/clusters/[^/]+/api/v1/namespaces/default/services/holmesgpt-holmes:80/proxy(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: holmesgpt-proxy-bridge
                port:
                  number: 80

