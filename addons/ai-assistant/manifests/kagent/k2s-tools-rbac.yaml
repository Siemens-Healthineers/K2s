# Read-only ClusterRole for k2s-tools MCP server.
# Grants only get/list/watch on operational resources.
# Explicitly excludes: secrets, exec, portforward, write verbs, RBAC APIs.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k2s-tools-reader
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
rules:
  # Core API resources — read-only
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - nodes
      - namespaces
      - events
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
      - replicationcontrollers
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  # Apps resources — read-only
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Batch resources — read-only
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # Networking — read-only
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  # Storage — read-only
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k2s-tools-reader-binding
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
subjects:
  - kind: ServiceAccount
    name: k2s-tools
    namespace: kagent
roleRef:
  kind: ClusterRole
  name: k2s-tools-reader
  apiGroup: rbac.authorization.k8s.io

