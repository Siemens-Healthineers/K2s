# Ollama-backed Kagent Agent — used in "ollama" provider mode (offline/air-gapped).
# This Agent uses Kagent's built-in AutoGen model integration with Ollama
# serving a local LLM. No external connectivity required.
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: ollama-model-config
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  provider: "Ollama"
  model: "devstral-k2s"
  ollama:
    host: "http://172.19.1.1:11434"
    options:
      temperature: "0"
      num_predict: "1024"
      keep_alive: "30m"
---
# Dummy API key secret — Ollama doesn't need auth but Kagent ModelConfig requires one
apiVersion: v1
kind: Secret
metadata:
  name: ollama-api-key
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
type: Opaque
data:
  # base64("ollama")
  OPENAI_API_KEY: "b2xsYW1h"
---
# MCPServer for kubectl tools — creates a managed deployment
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: k2s-tools
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  transportType: http
  httpTransport:
    targetPort: 8084
    path: /mcp
  deployment:
    image: ghcr.io/kagent-dev/kagent/tools:0.1.3
    replicas: 1
    port: 8084
---
# Agent definition using Ollama model with kubectl tools via MCP
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k2s-assistant
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  type: Declarative
  description: >-
    K2s Kubernetes assistant powered by a local Ollama LLM. Provides cluster
    inspection, diagnostics, and troubleshooting capabilities using kubectl
    tools. Runs fully offline — no external connectivity required.
  declarative:
    modelConfig: ollama-model-config
    systemMessage: |
      You are a Kubernetes cluster inspector. Call tools immediately. Never ask questions.

      RULES:
      1. ALWAYS call a tool first. NEVER respond without calling a tool.
      2. One tool call per step. Maximum 2 calls per request.
      3. Never invent data. Only report what tools return.

      RESPONSE FORMAT — after getting tool output, respond with:
      **Summary:** One sentence with counts (e.g., "2 nodes ready", "15 pods running").
      **Details:** List each resource by name with its key attributes. Use a bullet or table.
      Example for nodes:
        - kubemaster: Ready, control-plane, v1.35.5, 172.19.1.100, Debian 12
        - worker1: Ready, worker, v1.35.5, 172.20.1.2, Windows 10
      Example for pods:
        - coredns-xxx (kube-system): Running, 1/1 ready
        - etcd-kubemaster (kube-system): Running, 1/1 ready
      Example for deployments:
        - coredns (kube-system): 1/1 ready
        - ingress-nginx-controller (ingress-nginx): 1/1 ready
      If something is unhealthy, add **Action:** with a specific fix.

      TOOL MAP:
      - pods → k8s_get_resources(resource_type="pod", all_namespaces="true")
      - nodes → k8s_get_resources(resource_type="node")
      - deployments/services/etc → k8s_get_resources(resource_type="...", all_namespaces="true")
      - describe [type] [name] → k8s_describe_resource(resource_type="...", resource_name="...")
      - logs [pod] → k8s_get_pod_logs(pod_name="...", namespace="...")
      - events → k8s_get_events(namespace="all")
      - yaml [type] [name] → k8s_get_resource_yaml(resource_type="...", resource_name="...")
    tools:
      - type: McpServer
        mcpServer:
          name: k2s-tools
          toolNames:
            - k8s_get_resources
            - k8s_describe_resource
            - k8s_get_pod_logs
            - k8s_get_events
            - k8s_get_resource_yaml
    a2aConfig:
      skills:
        - id: cluster-inspection
          name: Cluster Inspection
          description: Inspect Kubernetes cluster resources, pods, nodes, events and logs
          tags:
            - kubernetes
            - kubectl
