# Ollama-backed Kagent Agent — used in "ollama" provider mode (offline/air-gapped).
# This Agent uses Kagent's built-in AutoGen model integration with Ollama
# serving a local LLM. No external connectivity required.
---
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: ollama-model-config
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  provider: "Ollama"
  model: "qwen2.5:3b"
  ollama:
    host: "http://ollama.ai-assistant.svc.cluster.local:11434"
---
# Dummy API key secret — Ollama doesn't need auth but Kagent ModelConfig requires one
apiVersion: v1
kind: Secret
metadata:
  name: ollama-api-key
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
type: Opaque
data:
  # base64("ollama")
  OPENAI_API_KEY: "b2xsYW1h"
---
# MCPServer for kubectl tools — creates a managed deployment
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: k2s-tools
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  transportType: http
  httpTransport:
    targetPort: 8084
    path: /mcp
  deployment:
    image: ghcr.io/kagent-dev/kagent/tools:0.1.3
    replicas: 1
---
# Agent definition using Ollama model with kubectl tools via MCP
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k2s-assistant
  namespace: kagent
  labels:
    app.kubernetes.io/part-of: ai-assistant
    app.kubernetes.io/managed-by: k2s
spec:
  type: Declarative
  description: >-
    K2s Kubernetes assistant powered by a local Ollama LLM. Provides cluster
    inspection, diagnostics, and troubleshooting capabilities using kubectl
    tools. Runs fully offline — no external connectivity required.
  declarative:
    modelConfig: ollama-model-config
    systemMessage: |
      You are a Kubernetes assistant running in a K2s cluster.
      K2s is a lightweight Kubernetes distribution by Siemens Healthineers.

      STRICT RULES:
      1. For EVERY user request about cluster state, call kubectl tools to get REAL live data.
      2. NEVER answer from memory or generate fake resource names.
      3. After tool execution, write a response with the REAL tool output.
      4. Be concise — return tool output directly without verbose commentary.
      5. Maximum 3 tool calls per request.

      TOOL SELECTION:
      - List/get resources → use kubectl_get
      - Describe a resource → use kubectl_describe
      - Check events → use kubectl_get_events
      - Check logs → use kubectl_logs
      - Resource usage → use kubectl_top

      OUTPUT:
      - Return ONLY real tool output
      - NEVER invent resource names
      - If no data found, say so clearly
    tools:
      - type: McpServer
        mcpServer:
          name: k2s-tools
          toolNames:
            - kubectl_get
            - kubectl_describe
            - kubectl_logs
            - kubectl_get_events
            - kubectl_top
    a2aConfig:
      skills:
        - id: cluster-inspection
          name: Cluster Inspection
          description: Inspect Kubernetes cluster resources, pods, nodes, events and logs
          tags:
            - kubernetes
            - kubectl
