apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagent-kmcp-controller-manager
  namespace: kagent
  labels:
    helm.sh/chart: kmcp-0.2.8
    app.kubernetes.io/name: kmcp
    app.kubernetes.io/instance: kagent
    control-plane: controller-manager
    app.kubernetes.io/version: "0.2.8"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kmcp
      app.kubernetes.io/instance: kagent
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: kmcp
        app.kubernetes.io/instance: kagent
        control-plane: controller-manager
    spec:
      serviceAccountName: kagent-kmcp-controller-manager
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: manager
        image: ghcr.io/kagent-dev/kmcp/controller:0.2.8
        imagePullPolicy: IfNotPresent
        command:
        - /manager
        args:
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=:8443
        ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
        - containerPort: 8081
          name: health
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        volumeMounts: []
      volumes: []
      terminationGracePeriodSeconds: 10
