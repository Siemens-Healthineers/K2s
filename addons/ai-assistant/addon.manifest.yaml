apiVersion: v1
kind: AddonManifest
metadata:
  name: ai-assistant
  description: AI Assistant for K2s — Kagent AI agent framework with Copilot CLI or Ollama backend
spec:
  implementations:
    - name: ai-assistant
      description: Deploys Kagent (Kubernetes AI agent framework) with a configurable backend — Copilot CLI for connected environments or Ollama for offline/air-gapped deployments. Injects the AI Assistant plugin into the Headlamp dashboard.
      offline_usage:
        linux:
          repos: []
          deb: []
          curl: []
          additionalImages:
            # Kagent framework
            - cr.kagent.dev/kagent-dev/kagent/controller:0.9.0
            - cr.kagent.dev/kagent-dev/kagent/ui:0.9.0
            - cr.kagent.dev/kagent-dev/kagent/app:0.9.0
            - cr.kagent.dev/kagent-dev/kagent/skills-init:0.9.0
            - ghcr.io/kagent-dev/kagent/tools:0.1.3
            - ghcr.io/kagent-dev/kmcp/controller:0.2.8
            - ghcr.io/kagent-dev/doc2vec/mcp:1.1.14
            - docker.io/library/postgres:18.3-alpine
            - docker.io/mcp/grafana:latest
            # Local-path provisioner (StorageClass for Kagent PVCs)
            - docker.io/rancher/local-path-provisioner:v0.0.30
            - docker.io/library/busybox:latest
            # A2A proxy and MCP preprocessor
            - shsk2s.azurecr.io/a2a-proxy:latest
            - shsk2s.azurecr.io/mcp-preprocessor:latest
            # Copilot CLI agent (connected mode)
            - shsk2s.azurecr.io/copilot-cli-a2a-wrapper:1.3.0
            # Ollama (offline mode)
            - ollama/ollama:0.9.1
            # Headlamp plugin + patch helper
            - shsk2s.azurecr.io/headlamp-plugin-ai-assistant:0.2.0-alpha
            - docker.io/library/busybox:1.37
          additionalImagesFiles:
            - manifests/kagent/kagent.yaml
            - manifests/ollama/ollama.yaml
        windows:
          curl: []
      commands:
        enable:
          cli:
            flags:
              - name: provider
                default: copilot
                description: "Agent provider: 'copilot' (connected, requires GitHub PAT) or 'ollama' (offline, local LLM)"
              - name: model
                default: qwen2.5:7b
                description: Ollama model to pull and use (only for ollama provider)
              - name: github-token
                default: ""
                description: GitHub PAT with Copilot Requests permission (only for copilot provider)
              - name: gpu
                default: false
                description: Enable GPU acceleration for Ollama (requires a GPU node with label gpu=true)
            examples:
              - cmd: k2s addons enable ai-assistant
                comment: Enable AI Assistant with Copilot CLI provider (default, connected)
              - cmd: k2s addons enable ai-assistant --provider copilot --github-token ghp_xxx
                comment: Enable with Copilot CLI and provide GitHub PAT inline
              - cmd: k2s addons enable ai-assistant --provider ollama
                comment: Enable with Ollama local LLM provider (offline/air-gapped)
              - cmd: k2s addons enable ai-assistant --provider ollama --model mistral
                comment: Enable with Ollama using the Mistral model
              - cmd: k2s addons enable ai-assistant --provider ollama --model phi3 --gpu
                comment: Enable with Ollama, Phi-3 model, and GPU acceleration
          script:
            subPath: Enable.ps1
            parameterMappings:
              - cliFlagName: provider
                scriptParameterName: Provider
              - cliFlagName: model
                scriptParameterName: Model
              - cliFlagName: github-token
                scriptParameterName: GithubToken
              - cliFlagName: gpu
                scriptParameterName: Gpu
        disable:
          cli:
            flags:
              - name: keep-model-data
                default: false
                description: Preserve the Ollama model PVC so downloaded models survive a re-enable
            examples:
              - cmd: k2s addons disable ai-assistant
                comment: Disable the AI Assistant addon (removes all resources including model data)
              - cmd: k2s addons disable ai-assistant --keep-model-data
                comment: Disable addon but keep downloaded Ollama models
          script:
            subPath: Disable.ps1
            parameterMappings:
              - cliFlagName: keep-model-data
                scriptParameterName: KeepModelData
        update:
          cli:
            examples:
              - cmd: k2s addons update ai-assistant
                comment: Re-apply Kagent manifests, re-wire proxy, and re-sync Headlamp plugin
          script:
            subPath: Update.ps1
