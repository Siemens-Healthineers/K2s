apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-pvc
  namespace: registry
  annotations:
    # Protect data-bearing claim from GitOps prune/cascade-delete (no data loss).
    kustomize.toolkit.fluxcd.io/prune: disabled
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  volumeName: registry-pv
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi