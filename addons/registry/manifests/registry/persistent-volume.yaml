apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv
  namespace: registry
  annotations:
    # Protect data-bearing volume from GitOps prune/cascade-delete (no data loss).
    kustomize.toolkit.fluxcd.io/prune: disabled
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 20Gi
  accessModes:
  - ReadWriteOnce
  local:
    path: /registry/repository
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - __STORAGE_NODE__
        - key: kubernetes.io/os
          operator: In
          values:
          - linux
