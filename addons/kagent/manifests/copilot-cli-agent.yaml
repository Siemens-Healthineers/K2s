# Copilot CLI BYO Agent for Kagent
# Deployed automatically when --byo-copilot is passed to 'k2s addons enable kagent'.
# Kagent manages the pod lifecycle via the BYO deployment spec.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: copilot-cli
  namespace: kagent
spec:
  type: BYO
  description: >-
    GitHub Copilot CLI wrapped as an A2A agent. Handles code generation,
    code review, cluster inspection, and RCA tasks via natural language.
    Uses persistent learnings from previous analyses to improve over time.
  byo:
    deployment:
      image: shsk2s.azurecr.io/copilot-cli-a2a-wrapper:1.2.0
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: copilot-github-token
              key: GITHUB_TOKEN
              # Secret lives in the same namespace as the pod (kagent).
              # Deploy-CopilotCliAgent copies it from 'default' namespace
              # so it survives addon disable/re-enable cycles.
        - name: COPILOT_TIMEOUT_SECONDS
          value: "300"
        - name: GH_HOST
          value: "shs.ghe.com"
        # Paths for mounted context and learnings
        - name: COPILOT_SYSTEM_CONTEXT_FILE
          value: "/etc/copilot/system-context.md"
        - name: COPILOT_LEARNINGS_FILE
          value: "/data/learnings/rca-heuristics.md"
        - name: HTTP_PROXY
          value: "http://172.19.1.1:8181"
        - name: HTTPS_PROXY
          value: "http://172.19.1.1:8181"
        - name: http_proxy
          value: "http://172.19.1.1:8181"
        - name: https_proxy
          value: "http://172.19.1.1:8181"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,172.19.1.0/24,172.20.0.0/16,172.21.0.0/16,.cluster.local,.svc"
        - name: no_proxy
          value: "localhost,127.0.0.1,172.19.1.0/24,172.20.0.0/16,172.21.0.0/16,.cluster.local,.svc"
      volumes:
        - name: system-context
          configMap:
            name: copilot-cli-context
        - name: learnings
          persistentVolumeClaim:
            claimName: copilot-cli-learnings
      volumeMounts:
        - name: system-context
          mountPath: /etc/copilot
          readOnly: true
        - name: learnings
          mountPath: /data/learnings
