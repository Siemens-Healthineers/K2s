# Source: nginx-gateway-fabric/templates/certs-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: nginx-gw-controller-cert-generator
  namespace: nginx-gw
  labels:
    helm.sh/chart: nginx-gateway-fabric-2.6.3
    app.kubernetes.io/name: nginx-gw
    app.kubernetes.io/instance: nginx-gw
    app.kubernetes.io/version: "2.6.3"
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": pre-install, pre-upgrade
spec:
  template:
    metadata:
      annotations:
    spec:
      automountServiceAccountToken: true
      containers:
        - args:
            - generate-certs
            - --service=nginx-gw-controller
            - --cluster-domain=cluster.local
            - --server-tls-secret=server-tls
            - --agent-tls-secret=agent-tls
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          image: ghcr.io/nginx/nginx-gateway-fabric:2.6.3
          imagePullPolicy: IfNotPresent
          name: cert-generator
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 101
            runAsGroup: 1001
      restartPolicy: Never
      serviceAccountName: nginx-gw-controller-cert-generator
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
  ttlSecondsAfterFinished: 30
