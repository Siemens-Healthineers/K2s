apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: nginx-gw
  labels:
    helm.sh/chart: nginx-gateway-fabric-2.5.1
    app.kubernetes.io/name: nginx-gw-controller
    app.kubernetes.io/instance: nginx-gw
    app.kubernetes.io/version: "2.5.1"
    app.kubernetes.io/managed-by: Helm
spec:
  controllerName: gateway.nginx.org/nginx-gw-controller
  parametersRef:
    group: gateway.nginx.org
    kind: NginxProxy
    name: nginx-gw-controller-proxy-config
    namespace: nginx-gw
