# Source: nginx-gateway-fabric/templates/service.yaml
# This is the control plane Service for internal communication with the data plane.
# To get an NGINX LoadBalancer Service, create a Gateway resource once NGINX Gateway Fabric is installed.
apiVersion: v1
kind: Service
metadata:
  name: nginx-gw-controller
  namespace: nginx-gw
  labels:
    helm.sh/chart: nginx-gateway-fabric-2.6.3
    app.kubernetes.io/name: nginx-gw
    app.kubernetes.io/instance: nginx-gw
    app.kubernetes.io/version: "2.6.3"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nginx-gw
    app.kubernetes.io/instance: nginx-gw
  ports:
    - name: agent-grpc
      port: 443
      protocol: TCP
      targetPort: 8443
