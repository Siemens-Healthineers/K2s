      - gateways/status
      - gateways/finalizers
      - gatewayclasses/status
      - grpcroutes/status
      - backendtlspolicies/status
      - tlsroutes/status
      - listenersets/status
    verbs:
      - update
  - apiGroups:
      - gateway.nginx.org
    resources:
      - nginxgateways
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.nginx.org
    resources:
      - nginxproxies
      - clientsettingspolicies
      - observabilitypolicies
      - upstreamsettingspolicies
      - authenticationfilters
      - proxysettingspolicies
      - ratelimitpolicies
      - wafpolicies
    verbs:
      - list
      - watch
  - apiGroups:
      - gateway.nginx.org
    resources:
      - nginxgateways/status
      - clientsettingspolicies/status
      - observabilitypolicies/status
      - upstreamsettingspolicies/status
      - authenticationfilters/status
      - proxysettingspolicies/status
      - ratelimitpolicies/status
      - wafpolicies/status
    verbs:
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - update
