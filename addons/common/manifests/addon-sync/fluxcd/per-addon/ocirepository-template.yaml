# Per-addon OCIRepository template — one instance per addon.
#
# Placeholders must be replaced by the consumer before
# applying with kubectl:
#   ADDON_NAME_PLACEHOLDER     — addon folder name (e.g. monitoring, rollout)
#   REGISTRY_HOST_PLACEHOLDER  — registry host:port (e.g. k2s.registry.local:30500)
#   INSECURE_PLACEHOLDER       — "true" or "false"
#
# Flux selects the highest matching immutable version tag (for example v1.2.3)
# from `addons/<name>` via `ref.semver` and reconciles the matching
# Kustomization (addon-sync-ADDON_NAME_PLACEHOLDER) when the selected revision changes.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: addon-sync-ADDON_NAME_PLACEHOLDER
  namespace: k2s-addon-sync
  labels:
    app.kubernetes.io/name: addon-sync
    app.kubernetes.io/component: source
    app.kubernetes.io/part-of: k2s
    k2s.io/addon: ADDON_NAME_PLACEHOLDER
spec:
  interval: 1m
  url: oci://REGISTRY_HOST_PLACEHOLDER/addons/ADDON_NAME_PLACEHOLDER
  ref:
    semver: ">=0.0.0-0"
  insecure: INSECURE_PLACEHOLDER
  layerSelector:
    mediaType: application/vnd.k2s.addon.manifests.v1.tar+gzip
    operation: extract
