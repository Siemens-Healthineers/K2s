# ServiceAccount for the addon-sync processor Job (HostProcess on Windows node).
# This SA needs no cluster RBAC — the Job accesses the host filesystem directly
# via HostProcess, not the Kubernetes API.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: addon-sync-processor
  namespace: k2s-addon-sync
  labels:
    app.kubernetes.io/name: addon-sync
    app.kubernetes.io/component: processor
    app.kubernetes.io/part-of: k2s
