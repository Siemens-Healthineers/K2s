# Base resources shared by both FluxCD and ArgoCD overlays.
# Not applied directly — referenced as ../base by fluxcd/ and argocd/ overlays.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k2s-addon-sync

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - rbac.yaml
  - configmap.yaml

# Generates the ConfigMap mounting Sync-Addons.ps1 into every HostProcess container
# (FluxCD per-addon sync Jobs and ArgoCD poller CronJob both mount it by name).
configMapGenerator:
  - name: addon-sync-script
    files:
      - Sync-Addons.ps1=scripts/Sync-Addons.ps1
