# CronJob that polls the OCI registry for changed addon artifacts.
#
# ArgoCD has no native OCI registry watcher. Instead of a separate Linux poller
# that talks to the K8s API, this CronJob runs Sync-Addons.ps1 directly as a
# Windows HostProcess — the same script used by the FluxCD sync Job — with
# -CheckDigest true. It discovers addons/* repos via oras repo ls, selects the
# highest semver tag, and compares the manifest digest against the per-addon
# digest file on the host filesystem. Changed addons are pulled and installed;
# unchanged addons are skipped.
#
# This replaces what would otherwise need: a webhook Deployment + webhook RBAC +
# Linux poller pod + separate K8s ConfigMap for state.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: addon-sync-poller
  namespace: k2s-addon-sync
  labels:
    app.kubernetes.io/name: addon-sync
    app.kubernetes.io/component: poller
    app.kubernetes.io/part-of: k2s
spec:
  schedule: "*/5 * * * *"
  # Prevent overlapping runs — a single poll may take up to 5 minutes if several addons changed.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 300
      activeDeadlineSeconds: 900
      backoffLimit: 0
      template:
        metadata:
          labels:
            app.kubernetes.io/name: addon-sync
            app.kubernetes.io/component: poller
            app.kubernetes.io/part-of: k2s
        spec:
          restartPolicy: Never
          serviceAccountName: addon-sync-processor
          nodeSelector:
            kubernetes.io/os: windows
          tolerations:
            - key: "OS"
              operator: "Equal"
              value: "Windows"
              effect: "NoSchedule"
          hostNetwork: true
          hostPID: true
          securityContext:
            windowsOptions:
              hostProcess: true
              runAsUserName: "NT AUTHORITY\\SYSTEM"
          containers:
            - name: addon-sync
              image: mcr.microsoft.com/windows/servercore:ltsc2022
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
              # Kubernetes substitutes $(VAR_NAME) from env vars defined in the same container spec.
              command:
                - powershell.exe
                - -ExecutionPolicy
                - Bypass
                - -NonInteractive
                - -File
                - C:\scripts\Sync-Addons.ps1
                - -RegistryUrl
                - $(REGISTRY_URL)
                - -K2sInstallDir
                - $(K2S_INSTALL_DIR)
                - -OrasExe
                - $(K2S_INSTALL_DIR)\bin\oras.exe
                - -Insecure
                - $(INSECURE)
                - -CheckDigest
                - "true"
              env:
                - name: CONTAINER_SANDBOX_MOUNT_POINT
                  value: "C:\\"
                - name: REGISTRY_URL
                  valueFrom:
                    configMapKeyRef:
                      name: addon-sync-config
                      key: REGISTRY_URL
                - name: K2S_INSTALL_DIR
                  valueFrom:
                    configMapKeyRef:
                      name: addon-sync-config
                      key: K2S_INSTALL_DIR
                - name: INSECURE
                  valueFrom:
                    configMapKeyRef:
                      name: addon-sync-config
                      key: INSECURE
              volumeMounts:
                - name: sync-script
                  mountPath: C:\scripts
                  readOnly: true
          volumes:
            - name: sync-script
              configMap:
                name: addon-sync-script

