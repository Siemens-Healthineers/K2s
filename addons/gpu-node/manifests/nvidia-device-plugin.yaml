apiVersion: v1
kind: Namespace
metadata:
  name: gpu-node
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    k8s-app: nvidia-device-plugin
  name: nvidia-device-plugin
  namespace: gpu-node
spec:
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      k8s-app: nvidia-device-plugin
  template:
    metadata:
      labels:
        k8s-app: nvidia-device-plugin
    spec:
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Mark this pod as a critical add-on; when enabled, the critical add-on
      # scheduler reserves resources for critical add-on pods so that they can
      # be rescheduled after a failure.
      # See https://kubernetes.io/docs/tasks/administer-cluster/guaranteed-scheduling-critical-addon-pods/
      priorityClassName: "system-node-critical"
      containers:
      - image: nvcr.io/nvidia/k8s-device-plugin:v0.18.2-ubi8
        imagePullPolicy: IfNotPresent
        name: nvidia-device-plugin-ctr
        env:
          - name: FAIL_ON_INIT_ERROR
            value: "false"
          - name: DP_DISABLE_HEALTHCHECKS
            value: "xids"
          # WSL2/dxcore: libnvidia-ml.so.1 stub + libdxcore.so from WSL2 lib path;
          # /usr/lib/wsl/drivers is also mounted (see volumes) so the stub can
          # dlopen the real NVML implementation from the 9p driver store.
          - name: LD_LIBRARY_PATH
            value: "/usr/lib/wsl/lib"
          # Phase 2 CDI: device plugin annotates pods with CDI device IDs;
          # CRI-O injects the device via the spec written to /var/run/cdi/
          - name: DEVICE_LIST_STRATEGY
            value: "cdi-annotations"
        securityContext:
          # privileged required: /dev/dxg is blocked inside unprivileged containers
          privileged: true
        lifecycle:
          postStart:
            exec:
              command:
                - sh
                - -c
                - |
                  # Wait up to 30 s for the device plugin to write the CDI spec
                  SPEC=/var/run/cdi/k8s.device-plugin.nvidia.com-gpu.json
                  i=0
                  while [ $i -lt 30 ] && [ ! -f "$SPEC" ]; do sleep 1; i=$((i+1)); done
                  [ -f "$SPEC" ] || exit 0
                  # Resolve GPU UUID so CRI-O can look up the CDI device by name.
                  # On WSL2/dxcore the spec only contains "name":"all"; the device
                  # plugin allocates by UUID, so we must add a UUID alias entry.
                  # nvidia-smi is at /usr/lib/wsl/lib/nvidia-smi (the /usr/bin
                  # symlink is only created by the CDI ldcache hook for workload containers)
                  # Sleep 2s to let the plugin finish writing the spec (it starts
                  # concurrently with this hook; the file may appear before the
                  # plugin has flushed all bytes).
                  sleep 2
                  UUID=$(/usr/lib/wsl/lib/nvidia-smi --query-gpu=uuid --format=csv,noheader 2>/dev/null | tr -d '[:space:]')
                  [ -z "$UUID" ] && exit 0
                  grep -q "\"$UUID\"" "$SPEC" && exit 0
                  # Build the UUID device entry (same deviceNode as "all")
                  NEW_DEV=',{"name":"'"$UUID"'","containerEdits":{"deviceNodes":[{"path":"/dev/dxg","hostPath":"/dev/dxg"}]}}'
                  # Insert the UUID device after the "all" device (before devices-array close ']').
                  # Pattern: }]}}] = close-devnode } + close-deviceNodes ] + close-containerEdits }
                  #           + close-allDevice } + close-devicesArray ]
                  # Write temp file within the same mounted directory so mv is an
                  # atomic rename (avoids cross-device EXDEV errors vs /tmp).
                  awk -v new_dev="$NEW_DEV" '{
                    pos=index($0,"}]}}]")
                    if(pos>0){print substr($0,1,pos+3) new_dev substr($0,pos+4)}
                    else{print}
                  }' "$SPEC" > /var/run/cdi/.cdi_tmp && mv /var/run/cdi/.cdi_tmp "$SPEC"
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
        - name: wsl-libs
          mountPath: /usr/lib/wsl/lib
        - name: wsl-drivers
          mountPath: /usr/lib/wsl/drivers
        - name: cdi-run
          mountPath: /var/run/cdi
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: wsl-libs
        hostPath:
          path: /usr/lib/wsl/lib
      - name: wsl-drivers
        # libnvidia-ml.so.1 is a stub that dlopens the real NVML implementation
        # from the WSL2 9p driver store at runtime. The driver store mount is
        # NOT inherited into container mount namespaces automatically; mounting
        # it explicitly makes NVML functional inside the device plugin container.
        hostPath:
          path: /usr/lib/wsl/drivers
      - name: cdi-run
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      nodeSelector:
        "kubernetes.io/os": linux