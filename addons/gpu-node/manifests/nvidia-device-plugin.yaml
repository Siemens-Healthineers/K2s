apiVersion: v1
kind: Namespace
metadata:
  name: gpu-node
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  labels:
    k8s-app: nvidia-device-plugin
  name: nvidia-device-plugin
  namespace: gpu-node
spec:
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      k8s-app: nvidia-device-plugin
  template:
    metadata:
      labels:
        k8s-app: nvidia-device-plugin
    spec:
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Mark this pod as a critical add-on; when enabled, the critical add-on
      # scheduler reserves resources for critical add-on pods so that they can
      # be rescheduled after a failure.
      # See https://kubernetes.io/docs/tasks/administer-cluster/guaranteed-scheduling-critical-addon-pods/
      priorityClassName: "system-node-critical"
      containers:
      - image: nvcr.io/nvidia/k8s-device-plugin:v0.19.2
        imagePullPolicy: IfNotPresent
        name: nvidia-device-plugin-ctr
        args:
          - --config-file=/etc/nvidia/config.yaml
        env:
          - name: FAIL_ON_INIT_ERROR
            value: "false"
          - name: DP_DISABLE_HEALTHCHECKS
            value: "xids"
          # WSL2/dxcore: needs libs from /usr/lib/wsl/lib and driver store from /usr/lib/wsl/drivers
          - name: LD_LIBRARY_PATH
            value: "/usr/lib/wsl/lib"
          # CDI: device plugin annotates pods with CDI device IDs
          - name: DEVICE_LIST_STRATEGY
            value: "cdi-annotations"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        securityContext:
          # privileged required: /dev/dxg is blocked inside unprivileged containers
          privileged: true
        livenessProbe:
          exec:
            command:
              - /usr/lib/wsl/lib/nvidia-smi
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 3
        lifecycle:
          postStart:
            exec:
              command:
                - sh
                - -c
                - |
                  # Wait up to 30 s for the device plugin to write the CDI spec
                  SPEC=/var/run/cdi/k8s.device-plugin.nvidia.com-gpu.json
                  i=0
                  while [ $i -lt 30 ] && [ ! -f "$SPEC" ]; do sleep 1; i=$((i+1)); done
                  [ -f "$SPEC" ] || exit 0
                  sleep 2

                  # Add GPU UUID device entry if not present
                  UUID=$(/usr/lib/wsl/lib/nvidia-smi --query-gpu=uuid --format=csv,noheader 2>/dev/null | tr -d '[:space:]')
                  if [ -n "$UUID" ] && ! grep -q "\"name\":\"$UUID\"" "$SPEC"; then
                    # Insert UUID device before the closing of devices array
                    awk -v uuid="$UUID" '{
                      if (match($0, /\}\]\}\}\]/)) {
                        pre = substr($0, 1, RSTART+3)
                        post = substr($0, RSTART+4)
                        print pre ",{\"name\":\"" uuid "\",\"containerEdits\":{\"deviceNodes\":[{\"path\":\"/dev/dxg\",\"hostPath\":\"/dev/dxg\"}]}}" post
                      } else print
                    }' "$SPEC" > "${SPEC}.tmp" && mv "${SPEC}.tmp" "$SPEC"
                  fi

                  # Add LD_LIBRARY_PATH if not present
                  if ! grep -q "LD_LIBRARY_PATH=/usr/lib/wsl/lib" "$SPEC"; then
                    sed -i 's/"env":\["NVIDIA_VISIBLE_DEVICES=void"/"env":["LD_LIBRARY_PATH=\/usr\/lib\/wsl\/lib","NVIDIA_VISIBLE_DEVICES=void"/g' "$SPEC"
                  fi

                  # Add directory mounts for full GPU library access (OpenGL needs libd3d12.so, libnvwgf2umx.so)
                  # Check if directory mount already exists (not just file mounts)
                  if ! grep -q '"containerPath":"/usr/lib/wsl/lib"' "$SPEC"; then
                    # Use awk to insert mounts at the beginning of the mounts array
                    awk '{
                      if (match($0, /"mounts":\[/)) {
                        pre = substr($0, 1, RSTART+9)
                        post = substr($0, RSTART+10)
                        lib = "{\"hostPath\":\"/usr/lib/wsl/lib\",\"containerPath\":\"/usr/lib/wsl/lib\",\"options\":[\"ro\",\"nosuid\",\"nodev\",\"rbind\"]}"
                        drv = "{\"hostPath\":\"/usr/lib/wsl/drivers\",\"containerPath\":\"/usr/lib/wsl/drivers\",\"options\":[\"ro\",\"nosuid\",\"nodev\",\"rbind\"]}"
                        print pre lib "," drv "," post
                      } else print
                    }' "$SPEC" > "${SPEC}.tmp" && mv "${SPEC}.tmp" "$SPEC"
                  fi
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
        - name: wsl-libs
          mountPath: /usr/lib/wsl/lib
        - name: wsl-drivers
          mountPath: /usr/lib/wsl/drivers
        - name: cdi-run
          mountPath: /var/run/cdi
        - name: time-slicing-config
          mountPath: /etc/nvidia/config.yaml
          subPath: config.yaml
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/device-plugins
      - name: wsl-libs
        hostPath:
          path: /usr/lib/wsl/lib
      - name: wsl-drivers
        # Must be mounted explicitly for NVML to work inside the container.
        hostPath:
          path: /usr/lib/wsl/drivers
      - name: cdi-run
        hostPath:
          path: /var/run/cdi
          type: DirectoryOrCreate
      - name: time-slicing-config
        configMap:
          name: time-slicing-config
      nodeSelector:
        "kubernetes.io/os": linux
        # Only schedule on nodes explicitly labeled as GPU-capable.
        # This label is applied by:
        # - The gpu-node addon Enable.ps1 (for KubeMaster)
        # - k2s node add (automatically when NVIDIA GPU is detected on external Linux workers)
        "gpu": "true"