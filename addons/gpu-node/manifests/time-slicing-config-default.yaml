# Default config: exclusive GPU access (no time-slicing).
# The NVIDIA device plugin rejects replicas: 1, so the sharing section is omitted.

apiVersion: v1
kind: Namespace
metadata:
  name: gpu-node
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: time-slicing-config
  namespace: gpu-node
data:
  config.yaml: |
    version: v1
