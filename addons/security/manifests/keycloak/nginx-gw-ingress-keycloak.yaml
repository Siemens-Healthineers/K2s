apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-nginx-gw-cluster-local
  namespace: security
spec:
  parentRefs:
    - name: nginx-cluster-local
      namespace: nginx-gw
      sectionName: https
  hostnames:
    - k2s.cluster.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /keycloak
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-Proto
                value: https
              - name: X-Forwarded-Host
                value: k2s.cluster.local
      backendRefs:
        - name: keycloak
          port: 8080
---
# NGINX Gateway API Ingress with Linkerd Authorization (keycloak)
# ==============================================================
# Gateway API (nginx-gw) requires explicit Linkerd ServerAuthorization because
# Linkerd doesn't automatically trust Gateway API traffic routing, unlike traditional Ingress.
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: keycloak
  namespace: security
spec:
  podSelector:
    matchLabels:
      app: keycloak
  port: 8080
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: keycloak-allow-all
  namespace: security
spec:
  server:
    name: keycloak
  # Allow unauthenticated access to match nginx/traefik behavior.
  # Keycloak handles its own authentication via OAuth2/OIDC.
  client:
    unauthenticated: true

