apiVersion: v1
kind: AddonManifest
metadata:
  name: dashboard
  description: Headlamp - Kubernetes Dashboard (kubernetes-sigs)
spec:
  implementations:
    - name: dashboard
      description: Headlamp - Kubernetes Dashboard (kubernetes-sigs)
      offline_usage:
        linux:
          repos: []
          deb: []
          curl: []
          additionalImages:
            - shsk2s.azurecr.io/headlamp-plugin-flux:0.6.0
            - shsk2s.azurecr.io/headlamp-plugin-cert-manager:0.1.1
            - shsk2s.azurecr.io/headlamp-plugin-prometheus:0.8.2
            - shsk2s.azurecr.io/headlamp-plugin-keda:0.1.2
            - shsk2s.azurecr.io/headlamp-plugin-kyverno:0.1.0
          additionalImagesFiles:
            - manifests/headlamp/headlamp.yaml
        windows:
          curl: []
      commands:
        enable:
          cli:
            flags:
              - name: ingress
                default: none
                description: Ingress controller to use for exposing dashboard
                constraints:
                  kind: validation-set
                  validationSet:
                    - none
                    - nginx
                    - nginx-gw
                    - traefik
              - name: enable-metrics
                default: false
                description: Enable metrics addon for use with dashboard
            examples:
              - cmd: k2s addons enable dashboard
                comment: Enable Headlamp dashboard in k2s
              - cmd: k2s addons enable dashboard --ingress traefik
                comment: Enable Headlamp dashboard in k2s with ingress traefik
              - cmd: k2s addons enable dashboard --ingress nginx-gw
                comment: Enable Headlamp dashboard in k2s with ingress nginx gateway fabric
              - cmd: k2s addons enable dashboard --ingress traefik --enable-metrics
                comment: Enable Headlamp dashboard in k2s with ingress traefik and metrics server
          script:
            subPath: Enable.ps1
            parameterMappings:
              - cliFlagName: ingress
                scriptParameterName: Ingress
              - cliFlagName: enable-metrics
                scriptParameterName: EnableMetricsServer
        disable:
          cli:
            examples:
              - cmd: k2s addons disable dashboard
                comment: Disable addon dashboard in k2s
          script:
            subPath: Disable.ps1
