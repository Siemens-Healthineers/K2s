# Headlamp service exposes the dashboard on port 4466 (HTTP, no TLS).
# Headlamp is configured with --base-url=/dashboard so it correctly
# constructs relative paths when served under the /dashboard/ prefix.

# This HTTPRoute attaches to the nginx-cluster-local Gateway in the nginx-gw namespace.
# The ReferenceGrant allows cross-namespace attachment from the dashboard namespace.
# The route exposes the Headlamp dashboard on:
# https://k2s.cluster.local/dashboard/
# The certificate is managed by the Gateway configuration in the nginx-gw namespace.
#
# No path rewriting is needed: the /dashboard/ prefix is preserved when
# forwarding to Headlamp because Headlamp expects it via --base-url.
# No bearer-token injection needed — Headlamp handles authentication natively.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: dashboard-to-nginx-gw
  namespace: nginx-gw
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: dashboard
  to:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: nginx-cluster-local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard-nginx-gw-cluster-local
  namespace: dashboard
spec:
  hostnames:
  - k2s.cluster.local
  parentRefs:
  - name: nginx-cluster-local
    namespace: nginx-gw
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dashboard/
    backendRefs:
    - name: headlamp
      port: 4466
status:
  parents: []
