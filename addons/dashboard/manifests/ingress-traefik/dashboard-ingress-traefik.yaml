# Headlamp service exposes a React application on port 4466 (HTTP).
# Headlamp is configured with --base-url=/dashboard so it correctly
# constructs relative paths when served under the /dashboard/ prefix.
# No path rewriting is needed: the /dashboard/ prefix is preserved when
# forwarding to Headlamp because Headlamp expects it via --base-url.

# This ingress will be merged with ingress provided in:
# addons/ingress/traefik/manifests/cluster-local-ingress.yaml
# and exposes the Headlamp dashboard application on:
# https://k2s.cluster.local/dashboard/
# The certificate is taken from k8s secret 'k2s.cluster.local-tls'
# (see addons/ingress/traefik/manifests/cluster-local-ingress.yaml)
# No bearer-token middleware needed — Headlamp handles authentication natively.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard-traefik-cluster-local
  namespace: dashboard
  annotations:
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: k2s.cluster.local
      http:
        paths:
          - path: /dashboard/
            pathType: Prefix
            backend:
              service:
                name: headlamp
                port:
                  number: 4466
