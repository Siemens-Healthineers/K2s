# Headlamp Helm chart values for k2s
# Chart: headlamp-0.40.1  (https://headlamp-k8s.github.io/headlamp)

image:
  registry: ghcr.io
  repository: headlamp-k8s/headlamp
  tag: "v0.43.0"
  pullPolicy: IfNotPresent

replicaCount: 1

config:
  baseURL: "/dashboard"
  pluginsDir: "/tmp/headlamp/plugins"

serviceAccount:
  create: true
  name: "headlamp"

clusterRoleBinding:
  create: true
  clusterRoleName: cluster-admin

nodeSelector:
  kubernetes.io/os: linux

resources:
  requests:
    cpu: 100m
    memory: 200Mi
  limits:
    cpu: 500m
    memory: 400Mi

service:
  port: 4466

ingress:
  enabled: false
