# ClusterRoleBinding granting the headlamp ServiceAccount (created by Helm chart)
# cluster-admin access so users can browse all cluster resources via the dashboard.
# The ServiceAccount itself is created by the Headlamp Helm chart (serviceAccount.create=true).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: headlamp-admin
subjects:
  - kind: ServiceAccount
    name: headlamp
    namespace: dashboard
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

