# Headlamp service exposes the dashboard on port 4466 (HTTP, no TLS).
# Headlamp is configured with --base-url=/dashboard so it correctly
# constructs relative paths when served under the /dashboard/ prefix.
#
# Secure variant (with security/OIDC addon active).
# No bearer-token injection needed — Headlamp handles OIDC authentication natively.
# No BackendTLSPolicy needed — Headlamp uses plain HTTP (no TLS on backend).
# No path rewriting is needed: the /dashboard/ prefix is preserved when
# forwarding to Headlamp because Headlamp expects it via --base-url.

# This HTTPRoute attaches to the nginx-cluster-local Gateway provided in:
# addons/ingress/nginx/manifests/cluster-local-ingress.yaml
# and exposes the Headlamp dashboard on:
# https://k2s.cluster.local/dashboard/
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: dashboard-to-nginx-gw
  namespace: nginx-gw
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: dashboard
  to:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: nginx-cluster-local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dashboard-nginx-gw-cluster-local
  namespace: dashboard
spec:
  hostnames:
  - k2s.cluster.local
  parentRefs:
  - name: nginx-cluster-local
    namespace: nginx-gw
    sectionName: https
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /dashboard/
    backendRefs:
    - name: headlamp
      port: 4466
status:
  parents: []
