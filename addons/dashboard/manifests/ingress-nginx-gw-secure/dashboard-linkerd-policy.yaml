#
# Linkerd Authorization Policy for Headlamp Dashboard with nginx-gw (Secure Mode)
# ================================================================================
# Gateway API (nginx-gw) requires explicit Linkerd ServerAuthorization.
#
# Traffic Flow:
#   External Client → nginx-gw-controller (port 443) → headlamp (port 4466)
#
# Security Model:
# - ServerAuthorization allows unauthenticated clients → headlamp
# - Headlamp itself handles OIDC/token authentication internally

apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: dashboard-headlamp
  namespace: dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: headlamp
  port: 4466
---
apiVersion: policy.linkerd.io/v1beta1
kind: ServerAuthorization
metadata:
  name: dashboard-allow-all
  namespace: dashboard
spec:
  server:
    name: dashboard-headlamp
  # Allow unauthenticated access — authentication handled by Headlamp natively.
  client:
    unauthenticated: true
