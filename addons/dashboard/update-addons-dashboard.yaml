# Argo Workflow: monitors kubernetes-sigs/headlamp for new releases,
# and raises a PR to update the dashboard addon to the latest version.
# Runs on a schedule or can be triggered manually.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: update-addons-dashboard
  namespace: workflows
spec:
  serviceAccountName: github-automation-sa
  entrypoint: dashboard-update-pipeline
  arguments:
    parameters:
      - name: headlamp-repo-owner
        value: kubernetes-sigs
      - name: headlamp-repo-name
        value: headlamp
      - name: k2s-repo-owner
        value: Siemens-Healthineers
      - name: k2s-repo-name
        value: K2s
  templates:
    - name: dashboard-update-pipeline
      steps:
        - - name: get-latest-headlamp-version
            template: fetch-latest-headlamp-version
            arguments:
              parameters:
                - name: repo-owner
                  value: "{{workflow.parameters.headlamp-repo-owner}}"
                - name: repo-name
                  value: "{{workflow.parameters.headlamp-repo-name}}"
        - - name: get-current-headlamp-version
            template: fetch-current-headlamp-version
            arguments:
              parameters:
                - name: repo-owner
                  value: "{{workflow.parameters.k2s-repo-owner}}"
                - name: repo-name
                  value: "{{workflow.parameters.k2s-repo-name}}"
        - - name: compare-headlamp-versions
            templateRef:
              name: update-common
              template: compare-and-decide
            arguments:
              parameters:
                - name: current-version
                  value: "{{steps.get-current-headlamp-version.outputs.result}}"
                - name: latest-version
                  value: "{{steps.get-latest-headlamp-version.outputs.result}}"
        - - name: create-headlamp-update-pr
            template: create-headlamp-update-pr
            when: "\"{{steps.compare-headlamp-versions.outputs.result}}\" == \"true\""
            arguments:
              parameters:
                - name: current-version
                  value: "{{steps.get-current-headlamp-version.outputs.result}}"
                - name: latest-version
                  value: "{{steps.get-latest-headlamp-version.outputs.result}}"
                - name: repo-owner
                  value: "{{workflow.parameters.k2s-repo-owner}}"
                - name: repo-name
                  value: "{{workflow.parameters.k2s-repo-name}}"

    - name: fetch-latest-headlamp-version
      inputs:
        parameters:
          - name: repo-owner
          - name: repo-name
      script:
        image: alpine/curl:latest
        command: [sh]
        source: |
          set -e
          REPO_OWNER="{{inputs.parameters.repo-owner}}"
          REPO_NAME="{{inputs.parameters.repo-name}}"
          echo "Fetching latest release from github.com/${REPO_OWNER}/${REPO_NAME}"
          RELEASES=$(curl -sf "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases?per_page=15" \
            -H "Accept: application/vnd.github+json" || echo "[]")
          # Filter stable releases only (reject -rc, -beta, -alpha tags)
          LATEST_TAG=$(echo "$RELEASES" | \
            grep -oE '"tag_name":\s*"v[0-9]+\.[0-9]+\.[0-9]+"' | \
            grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | \
            head -1 || true)
          if [ -z "$LATEST_TAG" ]; then
            echo "No stable release found; writing unknown"
            echo "unknown" > /tmp/version.txt
            cat /tmp/version.txt
            exit 0
          fi
          # Verify OCI image is available for this tag
          HTTP_CODE=$(curl -o /dev/null -sw "%{http_code}" \
            -H "Accept: application/vnd.oci.image.manifest.v1+json" \
            "https://ghcr.io/v2/headlamp-k8s/headlamp/manifests/${LATEST_TAG}" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Latest stable version with OCI image: ${LATEST_TAG}"
            echo "${LATEST_TAG}" > /tmp/version.txt
          else
            echo "OCI image not found for ${LATEST_TAG} (HTTP ${HTTP_CODE}); writing unknown"
            echo "unknown" > /tmp/version.txt
          fi
          cat /tmp/version.txt
      outputs:
        result: "{{script}}"

    - name: fetch-current-headlamp-version
      inputs:
        parameters:
          - name: repo-owner
          - name: repo-name
      script:
        image: alpine/curl:latest
        command: [sh]
        source: |
          set -e
          REPO_OWNER="{{inputs.parameters.repo-owner}}"
          REPO_NAME="{{inputs.parameters.repo-name}}"
          FILE_PATH="addons/dashboard/manifests/headlamp/headlamp.yaml"
          echo "Fetching current headlamp version from ${REPO_OWNER}/${REPO_NAME}/${FILE_PATH}"
          CONTENT=$(curl -sf \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}" | \
            jq -r '.content' | base64 -d)
          CURRENT_VERSION=$(echo "$CONTENT" | grep -oE 'ghcr\.io/headlamp-k8s/headlamp:v[0-9]+\.[0-9]+\.[0-9]+' | \
            grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
          if [ -z "$CURRENT_VERSION" ]; then
            echo "Could not determine current headlamp version"
            echo "unknown" > /tmp/version.txt
          else
            echo "Current headlamp version: ${CURRENT_VERSION}"
            echo "${CURRENT_VERSION}" > /tmp/version.txt
          fi
          cat /tmp/version.txt
      outputs:
        result: "{{script}}"

    - name: create-headlamp-update-pr
      inputs:
        parameters:
          - name: current-version
          - name: latest-version
          - name: repo-owner
          - name: repo-name
      script:
        image: alpine/git:latest
        command: [sh]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-credentials-approve
                key: token
        source: |
          set -e
          REPO_OWNER="{{inputs.parameters.repo-owner}}"
          REPO_NAME="{{inputs.parameters.repo-name}}"
          CURRENT_VERSION="{{inputs.parameters.current-version}}"
          NEW_VERSION="{{inputs.parameters.latest-version}}"

          # Strip v prefix for filenames and labels
          CURRENT_VERSION_BARE="${CURRENT_VERSION#v}"
          NEW_VERSION_BARE="${NEW_VERSION#v}"

          echo "Updating dashboard addon from ${CURRENT_VERSION} to ${NEW_VERSION}"

          # Clone repository
          git clone "https://${GITHUB_TOKEN}@github.com/${REPO_OWNER}/${REPO_NAME}.git" /workspace/k2s
          cd /workspace/k2s

          git config user.email "github-actions@siemens-healthineers.com"
          git config user.name "GitHub Automation"

          BRANCH="autoupdate/dashboard-headlamp-${NEW_VERSION}"
          git checkout -b "${BRANCH}"

          # ─── Update manifests/headlamp/headlamp.yaml ──────────────────────────────
          HEADLAMP_YAML="addons/dashboard/manifests/headlamp/headlamp.yaml"
          # Update image tag
          sed -i "s|ghcr.io/headlamp-k8s/headlamp:${CURRENT_VERSION}|ghcr.io/headlamp-k8s/headlamp:${NEW_VERSION}|g" "${HEADLAMP_YAML}"
          # Update version labels (no v prefix)
          sed -i "s|app.kubernetes.io/version: \"${CURRENT_VERSION_BARE}\"|app.kubernetes.io/version: \"${NEW_VERSION_BARE}\"|g" "${HEADLAMP_YAML}"
          # Update version comment
          sed -i "s|Based on Headlamp ${CURRENT_VERSION}|Based on Headlamp ${NEW_VERSION}|g" "${HEADLAMP_YAML}"
          # Update chart reference comment
          sed -i "s|headlamp-0\.${CURRENT_VERSION_BARE}\.tgz|headlamp-0.${NEW_VERSION_BARE}.tgz|g" "${HEADLAMP_YAML}" || true
          # Verify
          grep -q "headlamp-k8s/headlamp:${NEW_VERSION}" "${HEADLAMP_YAML}" || { echo "ERROR: image tag not updated in headlamp.yaml"; exit 1; }

          # ─── Update manifests/chart/values.yaml ──────────────────────────────────
          VALUES_YAML="addons/dashboard/manifests/chart/values.yaml"
          sed -i "s|tag: \"${CURRENT_VERSION}\"|tag: \"${NEW_VERSION}\"|g" "${VALUES_YAML}"
          grep -q "tag: \"${NEW_VERSION}\"" "${VALUES_YAML}" || echo "WARNING: tag not found in values.yaml - manual check required"

          # ─── Update Helm chart .tgz ───────────────────────────────────────────────
          CHART_DIR="addons/dashboard/manifests/chart"
          NEW_CHART_VERSION="0.${NEW_VERSION_BARE}"
          CHART_URL="https://headlamp-k8s.github.io/headlamp/headlamp-${NEW_CHART_VERSION}.tgz"
          echo "Attempting to download new Helm chart: ${CHART_URL}"
          HTTP_CODE=$(curl -o "${CHART_DIR}/headlamp-${NEW_CHART_VERSION}.tgz" -sw "%{http_code}" "${CHART_URL}" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Downloaded headlamp-${NEW_CHART_VERSION}.tgz successfully"
            # Remove old chart tgz and its license
            find "${CHART_DIR}" -name "headlamp-*.tgz" ! -name "headlamp-${NEW_CHART_VERSION}.tgz" -delete
            find "${CHART_DIR}" -name "headlamp-*.tgz.license" ! -name "headlamp-${NEW_CHART_VERSION}.tgz.license" -delete
            # Create license sidecar for new chart
            cat > "${CHART_DIR}/headlamp-${NEW_CHART_VERSION}.tgz.license" <<EOF
          SPDX-FileCopyrightText: © 2022 headlamp-k8s authors

          SPDX-License-Identifier: Apache-2.0
          EOF
            git add "${CHART_DIR}/headlamp-${NEW_CHART_VERSION}.tgz" "${CHART_DIR}/headlamp-${NEW_CHART_VERSION}.tgz.license"
          else
            echo "WARNING: Could not download Helm chart from ${CHART_URL} (HTTP ${HTTP_CODE}); skipping .tgz update"
          fi

          # ─── Stage all changes ────────────────────────────────────────────────────
          git add "${HEADLAMP_YAML}" "${VALUES_YAML}"
          # Remove old chart files if any were deleted
          git add -A "${CHART_DIR}/"

          COMMIT_TITLE="build(deps): addon dashboard - update Headlamp to ${NEW_VERSION}"
          COMMIT_BODY="Updates Headlamp dashboard addon from ${CURRENT_VERSION} to ${NEW_VERSION}.

          Changes:
          - image tag in ${HEADLAMP_YAML}: ${CURRENT_VERSION} -> ${NEW_VERSION}
          - app.kubernetes.io/version labels: ${CURRENT_VERSION_BARE} -> ${NEW_VERSION_BARE}
          - image.tag in ${VALUES_YAML}: ${CURRENT_VERSION} -> ${NEW_VERSION}
          - Helm chart .tgz updated to headlamp-${NEW_CHART_VERSION}.tgz (if download succeeded)

          Release notes: https://github.com/kubernetes-sigs/headlamp/releases/tag/${NEW_VERSION}"

          git commit -m "${COMMIT_TITLE}" -m "${COMMIT_BODY}"
          git push origin "${BRANCH}"

          # ─── Create Pull Request ──────────────────────────────────────────────────
          PR_BODY="## Dashboard Addon — Headlamp ${NEW_VERSION}

          This PR updates the Headlamp dashboard addon from **${CURRENT_VERSION}** to **${NEW_VERSION}**.

          ### Changes
          - \`${HEADLAMP_YAML}\` — image tag and version labels updated
          - \`${VALUES_YAML}\` — \`image.tag\` updated to \`${NEW_VERSION}\`
          - \`${CHART_DIR}/\` — Helm chart .tgz updated to \`headlamp-${NEW_CHART_VERSION}.tgz\`

          ### References
          - Release notes: https://github.com/kubernetes-sigs/headlamp/releases/tag/${NEW_VERSION}
          - Helm chart: https://headlamp-k8s.github.io/headlamp/

          ### Testing
          After merging, run: \`k2s addons enable dashboard -o\`"

          curl -sf -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/pulls" \
            -d "{
              \"title\": \"${COMMIT_TITLE}\",
              \"body\": $(echo "${PR_BODY}" | jq -Rs .),
              \"head\": \"${BRANCH}\",
              \"base\": \"main\",
              \"labels\": [\"dependencies\", \"automated\"]
            }"
          echo "Pull request created successfully"

