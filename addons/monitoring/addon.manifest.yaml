apiVersion: v1
kind: AddonManifest
metadata:
  name: monitoring
  description: Dashboard for cluster resource monitoring and logging
spec:
  implementations:
    - name: monitoring
      description: Dashboard for cluster resource monitoring and logging
      offline_usage:
        linux:
          repos: []
          deb: []
          curl: []
          additionalImages: []
          additionalImagesFiles:
            - manifests/monitoring/prometheus-operator/deployment.yaml
            - manifests/monitoring/grafana/deployment.yaml
        windows:
          curl: []
          additionalImages:
            - shsk2s.azurecr.io/prometheus-community/windows-exporter
          additionalImagesFiles:
            - ../common/manifests/windows-exporter/daemonset.yaml
      commands:
        enable:
          cli:
            flags:
              - name: ingress
                shorthand: i
                default: none
                description: Ingress controller to use for exposing dashboard
                constraints:
                  kind: validation-set
                  validationSet:
                    - none
                    - nginx
                    - nginx-gw
                    - traefik
              - name: omitGrafana
                description: Omit Grafana web UI; deploy only Prometheus, Alertmanager, and exporters
                type: boolean
                default: false
            examples:
              - cmd: k2s addons enable monitoring
                comment: Enable monitoring in k2s
              - cmd: k2s addons enable monitoring -o
                comment: Enable monitoring with detailed logs
              - cmd: k2s addons enable monitoring --ingress traefik
                comment: Enable monitoring in k2s with ingress traefik
              - cmd: k2s addons enable monitoring --omitGrafana
                comment: Enable monitoring without Grafana web UI (Prometheus, Alertmanager, and exporters only)
          script:
            subPath: Enable.ps1
            parameterMappings:
              - cliFlagName: ingress
                scriptParameterName: Ingress
              - cliFlagName: omitGrafana
                scriptParameterName: OmitGrafana
        disable:
          cli:
            examples:
              - cmd: k2s addons disable monitoring
                comment: Disable addon monitoring in k2s
          script:
            subPath: Disable.ps1
