apiVersion: v1
kind: PersistentVolume
metadata:
  name: dicom-pv-volume
  annotations:
    # Protect data-bearing volume from GitOps prune/cascade-delete (no data loss).
    kustomize.toolkit.fluxcd.io/prune: disabled
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  persistentVolumeReclaimPolicy: Retain
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/mnt/dicom/db"
