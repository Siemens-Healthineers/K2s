apiVersion: v1
kind: AddonManifest
metadata:
  name: logging
  description: Dashboard for Kubernetes container logs
spec:
  implementations:
    - name: logging
      description: Dashboard for Kubernetes container logs
      commands:
        enable:
          cli:
            flags:
              - name: ingress
                default: none
                description: Ingress controller to use for exposing logging dashboards
                constraints:
                  kind: validation-set
                  validationSet:
                    - none
                    - nginx
                    - nginx-gw
                    - traefik
              - name: omitOpensearch
                description: Deploy only Fluent-bit; omit OpenSearch and OpenSearch Dashboards
                default: false
              - name: enableAI
                description: Deploy AI log analysis layer (vector index, embedding pipeline, RAG query API) alongside the logging stack
                default: false
            examples:
              - cmd: k2s addons enable logging
                comment: Enable logging in k2s
              - cmd: k2s addons enable logging --ingress traefik
                comment: Enable logging in k2s with ingress traefik
              - cmd: k2s addons enable logging --omitOpensearch
                comment: Enable logging in k2s without OpenSearch (Fluent-bit stdout output only)
              - cmd: k2s addons enable logging --enableAI
                comment: Enable logging in k2s with AI-powered log analysis (k-NN vector search, RAG query API)
          script:
            subPath: Enable.ps1
            parameterMappings:
              - cliFlagName: ingress
                scriptParameterName: Ingress
              - cliFlagName: omitOpensearch
                scriptParameterName: OmitOpensearch
              - cliFlagName: enableAI
                scriptParameterName: EnableAI
        disable:
          cli:
            examples:
              - cmd: k2s addons disable logging
                comment: Disable addon logging in k2s
          script:
            subPath: Disable.ps1

