---
# Ollama - local embedding + LLM model server.
# Init container pulls nomic-embed-text once into the hostPath directory (/ollama on kubemaster);
# subsequent starts skip the pull. Uses hostPath to avoid PV/PVC binding issues.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: logging
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: ai
    spec:
      nodeSelector:
        kubernetes.io/hostname: kubemaster
        kubernetes.io/os: linux
      initContainers:
        - name: pull-embed-model
          image: "docker.io/ollama/ollama:0.9.1"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              ollama serve &
              OLLAMA_PID=$!
              echo "[Ollama-init] Waiting for server to be ready..."
              until ollama list > /dev/null 2>&1; do
                sleep 2
              done
              echo "[Ollama-init] Server ready. Checking if model already present..."
              if ollama list | grep -q "nomic-embed-text"; then
                echo "[Ollama-init] nomic-embed-text already present, skipping pull."
              else
                echo "[Ollama-init] Pulling nomic-embed-text..."
                ollama pull nomic-embed-text
                echo "[Ollama-init] Pull complete."
              fi
              kill $OLLAMA_PID
              wait $OLLAMA_PID 2>/dev/null || true
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
      containers:
        - name: ollama
          image: "docker.io/ollama/ollama:0.9.1"
          imagePullPolicy: IfNotPresent
          command: ["ollama", "serve"]
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          ports:
            - name: http
              containerPort: 11434
          readinessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["ollama", "list"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 2Gi
      volumes:
        - name: ollama-models
          hostPath:
            path: /ollama
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: logging
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: ai
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
