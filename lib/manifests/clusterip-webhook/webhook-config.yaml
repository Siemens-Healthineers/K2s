---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: k2s-clusterip-webhook
  labels:
    app.kubernetes.io/name: clusterip-webhook
    app.kubernetes.io/part-of: k2s
webhooks:
  - name: clusterip.k2s.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Ignore
    reinvocationPolicy: IfNeeded
    timeoutSeconds: 5
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["services"]
        scope: "Namespaced"
    # Skip the webhook's own namespace to avoid chicken-and-egg issues
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - k2s-clusterip-webhook
    clientConfig:
      service:
        name: clusterip-webhook
        namespace: k2s-clusterip-webhook
        path: /mutate
        port: 443
      # caBundle will be injected by the kube-webhook-certgen patch Job
      caBundle: ""
