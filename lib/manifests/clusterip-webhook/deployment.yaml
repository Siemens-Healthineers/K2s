---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clusterip-webhook
  namespace: k2s-clusterip-webhook
  labels:
    app.kubernetes.io/name: clusterip-webhook
    app.kubernetes.io/part-of: k2s
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clusterip-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clusterip-webhook
        app.kubernetes.io/part-of: k2s
    spec:
      serviceAccountName: clusterip-webhook
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: webhook
          image: shsk2s.azurecr.io/clusterip-webhook:v1.0.0
          imagePullPolicy: IfNotPresent
          args:
            - --addr=:8443
            - --linux-subnet=172.21.0.0/24
            - --windows-subnet=172.21.1.0/24
            - --reserved-ips=50
            - --tls-cert=/certs/tls.crt
            - --tls-key=/certs/tls.key
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tls-certs
          secret:
            secretName: clusterip-webhook-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
---
apiVersion: v1
kind: Service
metadata:
  name: clusterip-webhook
  namespace: k2s-clusterip-webhook
  labels:
    app.kubernetes.io/name: clusterip-webhook
    app.kubernetes.io/part-of: k2s
spec:
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 8443
      protocol: TCP
      name: https
  selector:
    app.kubernetes.io/name: clusterip-webhook
