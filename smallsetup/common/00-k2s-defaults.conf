#
# Default kubelet configuration overrides for K2s Windows worker nodes.
# This file is deployed to the kubelet drop-in directory
# (C:\etc\kubernetes\kubelet.conf.d\) and merged with the base
# kubelet config on startup.
#
# To add custom overrides, create additional .conf files in the same
# directory (e.g. 20-custom.conf). Files are merged in alphabetical
# order; later files override earlier ones.

apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
enforceNodeAllocatable: []
