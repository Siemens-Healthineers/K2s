apiVersion: v1
kind: Pod
metadata:
  name: ceph-share-writer
  namespace: ceph-share-test
  labels:
    app: ceph-share-writer
spec:
  nodeSelector:
    kubernetes.io/os: linux
  containers:
    - name: writer
      image: docker.io/library/busybox:1.36
      command:
        - sh
        - -c
        - >-
          set -eu;
          echo "hello from k2s ceph e2e" > /mnt/data/hello.txt;
          while true; do sleep 30; done
      volumeMounts:
        - name: ceph-data
          mountPath: /mnt/data
  volumes:
    - name: ceph-data
      persistentVolumeClaim:
        claimName: ceph-share-test-pvc
