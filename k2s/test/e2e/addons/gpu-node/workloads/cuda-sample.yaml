apiVersion: v1
kind: Pod
metadata:
  name: cuda-vector-add
spec:
  restartPolicy: OnFailure
  containers:
    - name: cuda-vector-add
      image: "nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda11.7.1"
      imagePullPolicy: IfNotPresent
      resources:
        limits:
          nvidia.com/gpu: 1 # Request for 1 GPU.
