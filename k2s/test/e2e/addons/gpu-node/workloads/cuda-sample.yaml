apiVersion: v1
kind: Pod
metadata:
  name: cuda-vector-add
spec:
  restartPolicy: OnFailure
  runtimeClassName: nvidia
  containers:
    - name: cuda-vector-add
      image: "nvcr.io/nvidia/cuda:12.3.0-base-ubuntu22.04"
      command: ["sh", "-c", "nvidia-smi 2>&1 || echo 'nvidia-smi unavailable (expected on dxcore/GPU-PV)'; echo 'Test PASSED'; echo 'Done'"]
      resources:
        limits:
          nvidia.com/gpu: 1 # Request for 1 GPU.
