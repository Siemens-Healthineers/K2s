# gpu-slice-test.yaml
apiVersion: v1
kind: Pod
metadata:
  name: gpu-test-1
spec:
  restartPolicy: Never
  containers:
  - name: gpu-test
    image: docker.io/library/alpine:3.21
    imagePullPolicy: IfNotPresent
    command: ["sh", "-c", "echo gpu-test-1 got GPU slot && sleep 5"]
    resources:
      limits:
        nvidia.com/gpu: 1
---
