# 10 Linux Deployments + Services to stress-test concurrent ClusterIP allocation.
# All are deployed simultaneously via kubectl apply to trigger parallel webhook calls.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-linux-01
  namespace: clusterip-stress-test
spec:
  selector:
    matchLabels:
      app: stress-linux-01
  replicas: 1
  template:
    metadata:
      labels:
        app: stress-linux-01
    spec:
      containers:
        - name: albums
          image: shsk2s.azurecr.io/example.albums-golang-linux:v1.5.0
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: RESOURCE
              value: "stress-linux-01"
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: stress-linux-01
  namespace: clusterip-stress-test
spec:
  selector:
    app: stress-linux-01
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
