# Headless services (ClusterIP: None) to verify the webhook correctly skips them.
# These must NOT receive a ClusterIP assignment — the webhook should pass them through.
#
# The first 4 services use the singular "clusterIP: None" field.
# The last 2 (*-plural) use the plural "clusterIPs: [None]" field to test that the
# webhook handles both forms correctly. Kubernetes normalizes both to clusterIP: None.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-headless-linux-01
  namespace: clusterip-stress-test
spec:
  selector:
    matchLabels:
      app: stress-headless-linux-01
  replicas: 1
  template:
    metadata:
      labels:
        app: stress-headless-linux-01
    spec:
      containers:
        - name: albums
          image: shsk2s.azurecr.io/example.albums-golang-linux:v1.5.0
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: RESOURCE
              value: "stress-headless-linux-01"
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: Service
metadata:
  name: stress-headless-linux-01
  namespace: clusterip-stress-test
spec:
  clusterIP: None
  selector:
    app: stress-headless-linux-01
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
