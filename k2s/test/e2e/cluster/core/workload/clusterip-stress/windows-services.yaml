# 10 Windows Deployments + Services to stress-test concurrent ClusterIP allocation.
# All are deployed simultaneously via kubectl apply to trigger parallel webhook calls.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stress-win-01
  namespace: clusterip-stress-test
spec:
  selector:
    matchLabels:
      app: stress-win-01
  replicas: 1
  template:
    metadata:
      labels:
        app: stress-win-01
    spec:
      containers:
        - name: albums
          image: shsk2s.azurecr.io/example.albums-golang-win:v1.5.0
          ports:
            - containerPort: 80
          env:
            - name: PORT
              value: "80"
            - name: RESOURCE
              value: "stress-win-01"
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: "OS"
          operator: "Equal"
          value: "Windows"
          effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: stress-win-01
  namespace: clusterip-stress-test
spec:
  selector:
    app: stress-win-01
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
