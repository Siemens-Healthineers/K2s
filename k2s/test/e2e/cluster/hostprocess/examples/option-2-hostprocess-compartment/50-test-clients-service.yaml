# Test clients consuming the HostProcess Service DIRECTLY (no ingress).
# The app port 8080 is MESHED (zero-trust), so callers need an mTLS identity. Both clients are
# meshed (linkerd.io/inject). Without the security addon the annotation is a no-op and they are
# plain pods (which also work, since 8080 is then unmeshed).
# - Linux client: curlimages/curl (uses the Service DNS name).
# - Windows client: a NORMAL (non-HostProcess) Windows pod. It reuses the pause-win image
#   (nanoserver-based, already OS-matched to the node, and ships curl.exe/cmd.exe/ping.exe) so
#   it pulls and runs; as a normal pod it gets a pod IP and can be meshed. nanoserver's curl
#   can't start the threaded DNS resolver, so it targets the Service ClusterIP (numeric) instead
#   of the DNS name.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-linux-svc
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-linux-svc
  template:
    metadata:
      labels:
        app: curl-linux-svc
      annotations:
        linkerd.io/inject: enabled # mTLS identity for the meshed app port (zero-trust)
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 5
      containers:
        - name: curl
          image: docker.io/curlimages/curl:8.5.0
          command: [sh]
          args:
            - -c
            - >-
              echo '+++ linux curl consuming HostProcess Service directly (meshed) +++';
              while true; do
                echo "--- GET /albums-win-hp-app-hostprocess (via Service DNS) ---";
                curl -s http://albums-win-hp-app-hostprocess.hostprocess-examples.svc.cluster.local:8080/albums-win-hp-app-hostprocess || echo 'curl failed';
                echo;
                sleep 15;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-windows-svc
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-windows-svc
  template:
    metadata:
      labels:
        app: curl-windows-svc
      annotations:
        linkerd.io/inject: enabled # mTLS identity for the meshed app port (zero-trust)
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: 'OS'
          operator: 'Equal'
          value: 'Windows'
          effect: 'NoSchedule'
      terminationGracePeriodSeconds: 5
      containers:
        # Normal (non-HostProcess) Windows pod. pause-win is nanoserver-based and OS-matched to
        # the node, and ships curl.exe/cmd.exe/ping.exe. As a normal pod it can be meshed and
        # obtains an mTLS identity for the zero-trust app port.
        # NOTE: nanoserver's curl cannot start the threaded DNS resolver ("getaddrinfo() thread
        # failed to start"), so it can't resolve *.svc.cluster.local. We use the Service ClusterIP
        # (numeric, no resolver thread needed) instead - it must match spec.clusterIP of the Service.
        # for /l with step 0 loops forever; `ping` provides the delay.
        - name: curl
          image: shsk2s.azurecr.io/pause-win:v1.7.0
          imagePullPolicy: IfNotPresent
          command: ['cmd.exe', '/c']
          args:
            - >-
              echo +++ windows curl consuming HostProcess Service (meshed) +++ &
              for /l %i in (1,0,2) do (
              curl.exe -sS -i http://172.21.1.212:8080/albums-win-hp-app-hostprocess &
              echo. &
              ping -n 16 127.0.0.1 > NUL )
