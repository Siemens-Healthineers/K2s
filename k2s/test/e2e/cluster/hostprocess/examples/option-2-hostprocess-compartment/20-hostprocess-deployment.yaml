# HostProcess Deployment: kubelet/containerd manage the lifecycle of albumswin.exe.
# This variant does NOT use cplauncher. A small PowerShell prelude resolves the anchor
# pod's network compartment (label app=cp-albums-win) and starts albumswin with the
# COMPARTMENT_ID_ATTACH env var set - albumswin then switches its OWN threads into that
# compartment before listening (see albumswin/main.go). The Service selector routes to
# the anchor pod and probes reach the app via the ClusterIP.
#
# Prerequisites:
#   * apply 05-launcher-configmap.yaml and 10-anchor-pod.yaml (Ready) first
#   * NT AUTHORITY\SYSTEM must be able to run kubectl (get pods). On the host run:
#       k2s system users add -u "NT AUTHORITY\SYSTEM"
#     and ensure that user has get/list on pods in hostprocess-examples.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: albums-win-hp-app-hostprocess
  namespace: hostprocess-examples
  labels:
    app: albums-win-hp-app-hostprocess
spec:
  replicas: 1
  selector:
    matchLabels:
      app: albums-win-hp-app-hostprocess
  template:
    metadata:
      labels:
        app: albums-win-hp-app-hostprocess
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: 'OS'
          operator: 'Equal'
          value: 'Windows'
          effect: 'NoSchedule'
      securityContext:
        windowsOptions:
          hostProcess: true
          runAsUserName: "NT AUTHORITY\\SYSTEM"
      hostNetwork: true
      containers:
        - name: albumswin
          image: shsk2s.azurecr.io/pause-win:v1.7.0
          imagePullPolicy: IfNotPresent
          env:
            - name: ALBUMS_WIN
              valueFrom:
                configMapKeyRef:
                  name: hostprocess-launcher-env
                  key: ALBUMS_WIN
            # Optional: only used if kubectl.exe is not on the SYSTEM PATH.
            - name: KUBECTL
              valueFrom:
                configMapKeyRef:
                  name: hostprocess-launcher-env
                  key: KUBECTL
                  optional: true
            - name: RESOURCE
              value: 'albums-win-hp-app-hostprocess'
          # No cplauncher: a mounted PowerShell script (see 06-launcher-script.yaml) resolves
          # the anchor pod's compartment, sets COMPARTMENT_ID_ATTACH and starts albumswin,
          # which self-switches its threads into that compartment. Keeping the logic in a
          # mounted file avoids brittle inline single-line/quoting in this manifest.
          # $env:CONTAINER_SANDBOX_MOUNT_POINT is set for HostProcess containers and points
          # at the mounted volumes' root on the host.
          command:
            - powershell.exe
            - -NoLogo
            - -NoProfile
            - -ExecutionPolicy
            - Bypass
            - -Command
            - '& "$env:CONTAINER_SANDBOX_MOUNT_POINT\scripts\start-albumswin.ps1"'
          # Probes target the static Service ClusterIP on the dedicated HEALTH port (8081):
          # the process listens in the anchor pod's compartment (not the host compartment),
          # so podIP/localhost do not work. albumswin serves /health/* on HEALTH_PORT=8081.
          readinessProbe:
            httpGet:
              host: 172.21.1.212 # must equal spec.clusterIP of the Service below
              port: 8081
              path: /health/readiness
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 6
          livenessProbe:
            httpGet:
              host: 172.21.1.212
              port: 8081
              path: /health/liveness
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 6
          startupProbe:
            httpGet:
              host: 172.21.1.212
              port: 8081
              path: /health/startup
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 18 # ~195s budget; covers compartment discovery + startup
            timeoutSeconds: 5
          volumeMounts:
            - name: launcher-scripts
              mountPath: C:/scripts # -> %CONTAINER_SANDBOX_MOUNT_POINT%\scripts on the host
            - name: host-var-log
              mountPath: C:/var/log
      volumes:
        - name: launcher-scripts
          configMap:
            name: hostprocess-launcher-scripts
        - name: host-var-log
          hostPath:
            path: C:/var/log
            type: DirectoryOrCreate
      restartPolicy: Always
---
# Service exposing the hostprocess albums application via the anchor compartment.
apiVersion: v1
kind: Service
metadata:
  name: albums-win-hp-app-hostprocess
  namespace: hostprocess-examples
  labels:
    app: albums-win-hp-app-hostprocess
spec:
  selector:
    app: cp-albums-win # <== anchor pod label (compartment owner)
  type: ClusterIP
  clusterIP: 172.21.1.212 # pick a free IP in the service CIDR; must match probe host above
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: health
      port: 8081 # dedicated health port; probes target ClusterIP:8081
      targetPort: 8081
      protocol: TCP
