# External routing for Option 2 with the ingress traefik addon (Gateway API).
# Enable it first:  k2s addons enable ingress traefik
#
# End-to-end flow:
#   curl client -> traefik ingress (172.19.1.100) -> albums-win-hp-app-hostprocess
#                  Service -> albumswin.exe in the anchor compartment
#
# The traefik addon runs the Gateway API provider (gatewayClassName: traefik) and
# exposes its 'web' entrypoint (container port 8080) as :80 on 172.19.1.100.
# The listener binds the shared K2s hostname k2s.cluster.local (-> 172.19.1.100).
#
# Call it:  curl.exe -v http://k2s.cluster.local/albums-win-hp-app-hostprocess
---
# GatewayClass for Traefik. The traefik addon does NOT ship one, and Traefik does
# not auto-create it, so the Gateway below would never be Accepted without this.
# Cluster-scoped + idempotent: harmless if it already exists.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: albums-gateway
  namespace: hostprocess-examples
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      hostname: k2s.cluster.local # shared K2s hostname (-> 172.19.1.100)
      port: 8080 # traefik 'web' entrypoint (published as :80 on 172.19.1.100)
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: albums-win-hp-app-hostprocess
  namespace: hostprocess-examples
spec:
  parentRefs:
    - name: albums-gateway
      namespace: hostprocess-examples
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /albums-win-hp-app-hostprocess # forwarded unchanged to albumswin.exe
      backendRefs:
        - name: albums-win-hp-app-hostprocess # HostProcess Service (anchor compartment)
          namespace: hostprocess-examples
          port: 8080
