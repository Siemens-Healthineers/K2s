# External routing for Option 2 with the ingress traefik addon (Gateway API).
# Enable it first:  k2s addons enable ingress traefik
#
# End-to-end flow:
#   curl client -> traefik ingress (172.19.1.100) -> albums-win-hp-app-hostprocess
#                  Service -> albumswin.exe in the anchor compartment
#
# The traefik addon runs the Gateway API provider (gatewayClassName: traefik) and exposes two
# entrypoints on 172.19.1.100:  'web' (container 8080) as :80, and 'websecure' (container 8443)
# as :443 with TLS for k2s.cluster.local (secret k2s-cluster-local-tls in ingress-traefik).
#
# IMPORTANT (meshed clusters / security addon): Linkerd's default inbound policy is
# 'all-authenticated', and the security addon meshes traefik while skipping ONLY the websecure
# (8443), traefik (9000) and metrics ports - NOT the web/HTTP port (8080). So on a meshed cluster
# traefik's HTTP entrypoint rejects unauthenticated external clients with 403; the working
# external door is HTTPS on :443 (websecure is skipped from the mesh, and traefik then forwards
# to the meshed backend using its own mesh identity). Both listeners below are provided:
#   - HTTP  (web)       -> works on clusters WITHOUT the security addon.
#   - HTTPS (websecure) -> the path to use WITH the security addon.
#
# Call it:  curl.exe -k https://k2s.cluster.local/albums-win-hp-app-hostprocess   (meshed)
#           curl.exe -v http://k2s.cluster.local/albums-win-hp-app-hostprocess    (no mesh)
---
# GatewayClass for Traefik. The traefik addon does NOT ship one, and Traefik does
# not auto-create it, so the Gateway below would never be Accepted without this.
# Cluster-scoped + idempotent: harmless if it already exists.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: traefik
spec:
  controllerName: traefik.io/gateway-controller
---
# Allow the Gateway in hostprocess-examples to reference the traefik TLS secret that lives in
# the ingress-traefik namespace (Gateway API forbids cross-namespace secret refs without this).
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: albums-gateway-to-traefik-cert
  namespace: ingress-traefik # namespace that OWNS the referenced Secret
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: hostprocess-examples
  to:
    - group: '' # core API group
      kind: Secret
      name: k2s-cluster-local-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: albums-gateway
  namespace: hostprocess-examples
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      hostname: k2s.cluster.local # shared K2s hostname (-> 172.19.1.100)
      port: 8080 # traefik 'web' entrypoint (published as :80 on 172.19.1.100)
      allowedRoutes:
        namespaces:
          from: All
    - name: websecure
      protocol: HTTPS
      hostname: k2s.cluster.local # shared K2s hostname (-> 172.19.1.100)
      port: 8443 # traefik 'websecure' entrypoint (published as :443 on 172.19.1.100)
      tls:
        mode: Terminate
        certificateRefs:
          # TLS cert for k2s.cluster.local, provisioned by the traefik addon.
          - group: ''
            kind: Secret
            name: k2s-cluster-local-tls
            namespace: ingress-traefik
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: albums-win-hp-app-hostprocess
  namespace: hostprocess-examples
spec:
  # No sectionName: the route attaches to BOTH listeners (web + websecure) since both share the
  # k2s.cluster.local hostname - so it is reachable over HTTP and HTTPS.
  parentRefs:
    - name: albums-gateway
      namespace: hostprocess-examples
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /albums-win-hp-app-hostprocess # forwarded unchanged to albumswin.exe
      backendRefs:
        - name: albums-win-hp-app-hostprocess # HostProcess Service (anchor compartment)
          namespace: hostprocess-examples
          port: 8080
