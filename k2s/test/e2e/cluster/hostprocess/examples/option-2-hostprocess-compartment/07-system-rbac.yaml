# RBAC for the HostProcess launch script. It runs as NT AUTHORITY\SYSTEM (mapped to the
# Kubernetes user 'k2s-NT-AUTHORITY-SYSTEM') and calls `kubectl get pod` to find the anchor
# pod IP. Without this the script fails with:
#   pods is forbidden: User "k2s-NT-AUTHORITY-SYSTEM" cannot list resource "pods"
#
# Prerequisite: the SYSTEM user must have a kubeconfig first: run on the host
#   k2s system users add -u "NT AUTHORITY\SYSTEM"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: anchor-pod-reader
  namespace: hostprocess-examples
rules:
  - apiGroups: ['']
    resources: ['pods']
    verbs: ['get', 'list']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: system-anchor-pod-reader
  namespace: hostprocess-examples
subjects:
  - kind: User
    name: k2s-NT-AUTHORITY-SYSTEM # NT AUTHORITY\SYSTEM mapped by K2s
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: anchor-pod-reader
  apiGroup: rbac.authorization.k8s.io
