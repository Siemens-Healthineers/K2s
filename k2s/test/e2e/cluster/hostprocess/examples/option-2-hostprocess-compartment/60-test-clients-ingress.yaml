# Test clients calling the app THROUGH the traefik ingress:
#   client -> traefik (k2s.cluster.local / 172.19.1.100) -> HostProcess Service
#          -> albumswin.exe in the anchor compartment
# Requires 40-gateway-api.yaml (traefik Gateway + HTTPRoute) applied.
#
# Both clients are NORMAL pods (the Windows client does NOT run as NT AUTHORITY\SYSTEM and does
# not use the host network). They call the ingress over HTTPS on :443.
#
# WHY HTTPS: on a meshed cluster (security addon) Linkerd's default inbound policy is
# 'all-authenticated' and traefik is meshed with ONLY websecure/traefik/metrics ports skipped -
# NOT the HTTP 'web' port. So plain HTTP to traefik is rejected with 403 for unauthenticated
# clients. The 'websecure' (:443) entrypoint IS skipped from the mesh, so external/unmeshed
# clients can use it; traefik then forwards to the meshed backend with its own identity.
#
# nanoserver's curl cannot start the threaded DNS resolver, so the Windows client uses
# `curl --resolve` to pin k2s.cluster.local to the ingress IP (172.19.1.100); this still sends
# the correct SNI/Host, which the traefik Gateway listener requires. -k skips verification of the
# self-signed cluster-local certificate.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-linux-ingress
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-linux-ingress
  template:
    metadata:
      labels:
        app: curl-linux-ingress
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 5
      containers:
        - name: curl
          image: docker.io/curlimages/curl:8.5.0
          command: [sh]
          args:
            - -c
            - >-
              echo '+++ linux curl via traefik ingress (HTTPS) +++';
              while true; do
                echo "--- GET /albums-win-hp-app-hostprocess (through ingress, https) ---";
                curl -sS -i -k --resolve k2s.cluster.local:443:172.19.1.100 https://k2s.cluster.local/albums-win-hp-app-hostprocess || echo 'curl failed';
                echo;
                sleep 15;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-windows-ingress
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-windows-ingress
  template:
    metadata:
      labels:
        app: curl-windows-ingress
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: 'OS'
          operator: 'Equal'
          value: 'Windows'
          effect: 'NoSchedule'
      terminationGracePeriodSeconds: 5
      containers:
        # Normal (non-HostProcess) Windows pod - it does NOT run as NT AUTHORITY\SYSTEM and does
        # not use the host network. pause-win is nanoserver-based, OS-matched to the node, and
        # ships curl.exe/cmd.exe/ping.exe, so it pulls and runs.
        # NOTE: nanoserver's curl cannot start the threaded DNS resolver ("getaddrinfo() thread
        # failed to start"), so it can't resolve k2s.cluster.local. We use `curl --resolve` to
        # pin the name to the ingress IP (172.19.1.100): this bypasses the resolver AND still
        # sends "Host: k2s.cluster.local", which the traefik Gateway listener requires to match.
        # for /l with step 0 loops forever; `ping` provides the delay.
        - name: curl
          image: shsk2s.azurecr.io/pause-win:v1.8.0
          imagePullPolicy: IfNotPresent
          command: ['cmd.exe', '/c']
          args:
            - >-
              echo +++ windows curl via traefik ingress (HTTPS) +++ &
              for /l %i in (1,0,2) do (
              curl.exe -sS -i -k --resolve k2s.cluster.local:443:172.19.1.100 https://k2s.cluster.local/albums-win-hp-app-hostprocess &
              echo. &
              ping -n 16 127.0.0.1 > NUL )
