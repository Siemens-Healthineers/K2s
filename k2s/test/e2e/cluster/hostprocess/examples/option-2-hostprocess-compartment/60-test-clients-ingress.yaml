# Test clients calling the app THROUGH the traefik ingress:
#   client -> traefik (k2s.cluster.local / 172.19.1.100) -> HostProcess Service
#          -> albumswin.exe in the anchor compartment
# Requires 40-gateway-api.yaml (traefik Gateway + HTTPRoute) applied.
#
# Both clients call the DNS name http://k2s.cluster.local/albums-win-hp-app-hostprocess
# (resolved in-cluster via CoreDNS for the Linux pod, and via the host resolver for the
# Windows HostProcess client). Using the URL (no -H Host header) also avoids cmd.exe
# quote-escaping on Windows.
#
# NOTE (mesh): the app port 8080 is meshed. traefik must be authorized to reach it - either
# traefik is meshed (security addon) and permitted by your zero-trust policy, or you add a
# policy allowing it. If ingress calls return 403, that is the mesh denying traefik->backend,
# not the client.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-linux-ingress
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-linux-ingress
  template:
    metadata:
      labels:
        app: curl-linux-ingress
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 5
      containers:
        - name: curl
          image: docker.io/curlimages/curl:8.5.0
          command: [sh]
          args:
            - -c
            - >-
              echo '+++ linux curl via traefik ingress +++';
              while true; do
                echo "--- GET /albums-win-hp-app-hostprocess (through ingress) ---";
                curl -s http://k2s.cluster.local/albums-win-hp-app-hostprocess || echo 'curl failed';
                echo;
                sleep 15;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-windows-ingress
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-windows-ingress
  template:
    metadata:
      labels:
        app: curl-windows-ingress
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: 'OS'
          operator: 'Equal'
          value: 'Windows'
          effect: 'NoSchedule'
      securityContext:
        windowsOptions:
          hostProcess: true
          runAsUserName: "NT AUTHORITY\\SYSTEM"
      hostNetwork: true
      terminationGracePeriodSeconds: 5
      containers:
        # pause-win is already used by this cluster, so it is guaranteed to pull.
        - name: curl
          image: shsk2s.azurecr.io/pause-win:v1.7.0
          imagePullPolicy: IfNotPresent
          # for /l with step 0 loops forever; use `ping` as the delay (timeout needs a
          # console input handle, which HostProcess containers lack).
          command: ['cmd.exe', '/c']
          args:
            - >-
              echo +++ windows curl via traefik ingress +++ &
              for /l %i in (1,0,2) do (
              curl.exe -s http://k2s.cluster.local/albums-win-hp-app-hostprocess &
              echo. &
              ping -n 16 127.0.0.1 > NUL )
