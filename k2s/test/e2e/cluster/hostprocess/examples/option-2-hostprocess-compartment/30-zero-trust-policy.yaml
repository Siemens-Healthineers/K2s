# Illustrative zero-trust policy for the native process running in the anchor compartment.
# Requires the security addon (enhanced): k2s addons enable security --type enhanced
#
# Model: "security through infrastructure"
#   1. A Server object switches port 8080 of the anchor pod to DEFAULT-DENY.
#   2. An HTTPRoute narrows allowed traffic to GET on the application route only.
#   3. An AuthorizationPolicy permits only meshed (mTLS) client identities.
# Everything not explicitly allowed is rejected — around an unmodified binary.
---
apiVersion: policy.linkerd.io/v1beta3
kind: Server
metadata:
  name: albums-hp-server
  namespace: hostprocess-examples
  labels:
    app: albums-win-hp-app-hostprocess
spec:
  podSelector:
    matchLabels:
      app: cp-albums-win # anchor pod that owns the compartment
  port: 8080
  proxyProtocol: HTTP/1
---
apiVersion: policy.linkerd.io/v1beta3
kind: HTTPRoute
metadata:
  name: albums-hp-get-only
  namespace: hostprocess-examples
spec:
  parentRefs:
    - name: albums-hp-server
      kind: Server
      group: policy.linkerd.io
  rules:
    - matches:
        - method: GET
          path:
            type: PathPrefix
            value: /albums-win-hp-app-hostprocess
---
# Allow only mTLS-authenticated (meshed) client identities in the cluster.
apiVersion: policy.linkerd.io/v1alpha1
kind: MeshTLSAuthentication
metadata:
  name: any-meshed-identity
  namespace: hostprocess-examples
spec:
  identities:
    - '*.hostprocess-examples.serviceaccount.identity.linkerd.cluster.local'
---
apiVersion: policy.linkerd.io/v1alpha1
kind: AuthorizationPolicy
metadata:
  name: albums-hp-allow-get
  namespace: hostprocess-examples
spec:
  targetRef:
    group: policy.linkerd.io
    kind: HTTPRoute
    name: albums-hp-get-only
  requiredAuthenticationRefs:
    - group: policy.linkerd.io
      kind: MeshTLSAuthentication
      name: any-meshed-identity
