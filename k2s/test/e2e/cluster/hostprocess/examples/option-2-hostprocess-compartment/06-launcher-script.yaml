# PowerShell script mounted into the HostProcess container (see 20-hostprocess-deployment.yaml).
# Keeping the logic in a mounted file - instead of an inline -Command in the Deployment -
# avoids brittle single-line/quoting and is easy to maintain and lint.
#
# It resolves the anchor pod's Windows network compartment and starts albumswin with
# COMPARTMENT_ID_ATTACH set, so albumswin self-switches its threads into that compartment
# (no cplauncher). Reads the ALBUMS_WIN and (optional) KUBECTL env vars from the Deployment.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hostprocess-launcher-scripts
  namespace: hostprocess-examples
data:
  start-albumswin.ps1: |
    # SPDX-FileCopyrightText: © 2026 Siemens Healthineers AG
    # SPDX-License-Identifier: MIT
    $ErrorActionPreference = 'Stop'
    $ns = 'hostprocess-examples'
    $label = 'app=cp-albums-win'

    # Locate kubectl (PATH first, then the optional KUBECTL env override).
    $kubectl = (Get-Command kubectl.exe -ErrorAction SilentlyContinue).Source
    if (-not $kubectl -and $env:KUBECTL -and (Test-Path $env:KUBECTL)) { $kubectl = $env:KUBECTL }
    if (-not $kubectl) { throw 'kubectl not found on PATH; set KUBECTL in 05-launcher-configmap.yaml' }

    # Resolve the anchor pod IP, then map it to its Windows network compartment by parsing
    # `ipconfig /allcompartments` (the same technique cplauncher uses internally).
    $cid = $null
    $podIP = ''
    for ($i = 0; $i -lt 60 -and $null -eq $cid; $i++) {
        $podIP = (& $kubectl get pod -l $label -n $ns -o "jsonpath={.items[0].status.podIP}" 2>$null)
        if ($podIP) {
            $cur = -1
            foreach ($line in (ipconfig /allcompartments)) {
                if ($line -match '(?i)compartment[^0-9]*([0-9]+)') { $cur = [int]$Matches[1] }
                elseif ($cur -ge 0 -and $line -match [regex]::Escape($podIP)) { $cid = $cur; break }
            }
        }
        if ($null -eq $cid) { Start-Sleep -Seconds 2 }
    }
    if ($null -eq $cid) { throw "could not resolve compartment for anchor pod ($label in $ns)" }

    Write-Host "Starting albumswin in compartment $cid (anchor IP $podIP) via COMPARTMENT_ID_ATTACH"
    # albumswin reads COMPARTMENT_ID_ATTACH and self-switches its threads - no cplauncher/DLL.
    $env:COMPARTMENT_ID_ATTACH = "$cid"
    & "$env:ALBUMS_WIN"
