# Test clients that consume the albums-external Service DIRECTLY (no ingress).
# - Linux client (normal pod) curls the Service DNS name.
# - Windows client runs as a HostProcess container (host network) and curls the
#   native process via the KubeSwitch IP 172.19.1.1 (cluster DNS is not resolvable
#   from the host; a HostProcess base avoids Windows OS-build image matching).
# Deployment names end with '-svc' so they can coexist with the ingress clients.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-linux-svc
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-linux-svc
  template:
    metadata:
      labels:
        app: curl-linux-svc
    spec:
      nodeSelector:
        kubernetes.io/os: linux
      terminationGracePeriodSeconds: 5
      containers:
        - name: curl
          image: docker.io/curlimages/curl:8.5.0
          command: [sh]
          args:
            - -c
            - >-
              echo '+++ linux curl consuming albums-external Service directly +++';
              while true; do
                echo "--- GET /albums-win (via Service DNS) ---";
                curl -s http://albums-external.hostprocess-examples.svc.cluster.local/albums-win || echo 'curl failed';
                echo;
                sleep 15;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: curl-windows-svc
  namespace: hostprocess-examples
spec:
  replicas: 1
  selector:
    matchLabels:
      app: curl-windows-svc
  template:
    metadata:
      labels:
        app: curl-windows-svc
    spec:
      nodeSelector:
        kubernetes.io/os: windows
      tolerations:
        - key: 'OS'
          operator: 'Equal'
          value: 'Windows'
          effect: 'NoSchedule'
      securityContext:
        windowsOptions:
          hostProcess: true
          runAsUserName: "NT AUTHORITY\\SYSTEM"
      hostNetwork: true
      terminationGracePeriodSeconds: 5
      containers:
        - name: curl
          image: shsk2s.azurecr.io/pause-win:v1.7.0
          imagePullPolicy: IfNotPresent
          # for /l with step 0 loops forever; use `ping` as the delay (timeout needs a
          # console input handle, which HostProcess containers lack).
          command: ['cmd.exe', '/c']
          args:
            - >-
              echo +++ windows curl consuming host process via 172.19.1.1 +++ &
              for /l %i in (1,0,2) do (
              curl.exe -s http://172.19.1.1:8080/albums-win &
              echo. &
              ping -n 16 127.0.0.1 > NUL )
