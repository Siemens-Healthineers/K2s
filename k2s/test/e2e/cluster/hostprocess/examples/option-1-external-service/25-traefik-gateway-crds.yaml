# Prerequisite for using the Gateway API with the ingress traefik addon.
#
# WHY THIS IS NEEDED:
#   Traefik v3's Kubernetes Gateway provider watches the experimental route types
#   TCPRoute and TLSRoute. K2s installs only the STANDARD-channel Gateway API CRDs
#   (gatewayclasses, gateways, httproutes, grpcroutes, referencegrants,
#   backendtlspolicies) - it does NOT ship TCPRoute/TLSRoute. Without them Traefik's
#   informers fail to sync, the Gateway provider stalls, and the Gateway/GatewayClass
#   stay 'Waiting for controller' -> every request returns 404.
#
#   These stub CRDs make the watches succeed (empty lists), unblocking the provider.
#   They serve BOTH v1alpha2 and v1alpha3 - Gateway API v1.4.1 serves TLSRoute at
#   both and Traefik lists the storage version (v1alpha3), so both must exist.
#   Alternatively install the official, fully-schema'd CRDs (needs internet):
#     kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/experimental/gateway.networking.k8s.io_tlsroutes.yaml
#     kubectl apply -f https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.4.1/config/crd/experimental/gateway.networking.k8s.io_tcproutes.yaml
#
# Apply BEFORE 30-gateway-api.yaml, wait for Established, then RESTART traefik so its
# Gateway provider re-initializes with the now-present CRDs:
#   kubectl apply -f 25-traefik-gateway-crds.yaml
#   kubectl wait --for condition=established crd/tcproutes.gateway.networking.k8s.io crd/tlsroutes.gateway.networking.k8s.io
#   kubectl -n ingress-traefik rollout restart deploy/traefik
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tcproutes.gateway.networking.k8s.io
  labels:
    gateway.networking.k8s.io/channel: experimental
  annotations:
    # Required: gateway.networking.k8s.io is an API-protected group.
    api-approved.kubernetes.io: https://github.com/kubernetes-sigs/gateway-api/pull/2466
spec:
  group: gateway.networking.k8s.io
  scope: Namespaced
  names:
    kind: TCPRoute
    listKind: TCPRouteList
    plural: tcproutes
    singular: tcproute
  versions:
    - name: v1
      served: true
      storage: false
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
    - name: v1alpha2
      served: true
      storage: false
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
    - name: v1alpha3
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tlsroutes.gateway.networking.k8s.io
  labels:
    gateway.networking.k8s.io/channel: experimental
  annotations:
    # Required: gateway.networking.k8s.io is an API-protected group.
    api-approved.kubernetes.io: https://github.com/kubernetes-sigs/gateway-api/pull/2466
spec:
  group: gateway.networking.k8s.io
  scope: Namespaced
  names:
    kind: TLSRoute
    listKind: TLSRouteList
    plural: tlsroutes
    singular: tlsroute
  versions:
    - name: v1
      served: true
      storage: false
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
    - name: v1alpha2
      served: true
      storage: false
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
    - name: v1alpha3
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
