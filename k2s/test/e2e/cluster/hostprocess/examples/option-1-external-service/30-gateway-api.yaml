# External routing for Option 1 with the ingress traefik addon (Gateway API).
# Enable it first:  k2s addons enable ingress traefik
#
# End-to-end flow:
#   curl client -> traefik ingress (172.19.1.100) -> albums-external Service
#                -> native albumswin.exe on 172.19.1.1:8080
#
# The traefik addon runs the Gateway API provider (gatewayClassName: traefik) and
# exposes its 'web' entrypoint (container port 8080) as :80 on 172.19.1.100.
#
# Call it:  curl.exe -v http://k2s.cluster.local/albums-win
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: albums-gateway
  namespace: hostprocess-examples
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      protocol: HTTP
      port: 8080 # traefik 'web' entrypoint (published as :80 on 172.19.1.100)
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: albums-external
  namespace: hostprocess-examples
spec:
  parentRefs:
    - name: albums-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /albums-win # forwarded unchanged to albumswin.exe
      backendRefs:
        - name: albums-external # selectorless Service in front of 172.19.1.1
          port: 80
