kind: k2s
apiVersion: v1
nodes:
  - role: control-plane # required
    resources:
      cpu: 6 # default
      memory: 6GB # default startup memory (set to memoryMin if only memoryMin/memoryMax specified, otherwise 6GB)
      memoryMin: # optional, minimum RAM for dynamic memory (auto-enables dynamic memory)
      memoryMax: # optional, maximum RAM for dynamic memory (auto-enables dynamic memory)
      disk: 50GB # default
env:
  httpProxy: # default
  additionalHooksDir: # default
  restartPostInstallCount: # default
installBehavior:
  showOutput: false # default
  deleteFilesForOfflineInstallation: false # default
  forceOnlineInstallation: false # default
  wsl: false # default
  appendLog: false # default
  skipStart: false # default
