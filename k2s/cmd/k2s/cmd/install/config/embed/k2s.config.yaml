kind: k2s
apiVersion: v1
nodes:
  - role: control-plane # required
    resources:
      cpu: 6 # default
      memory: 6GB # default startup memory
      memoryMin: 2GB # optional, minimum RAM for dynamic memory (when dynamicMemory is true)
      memoryMax: 8GB # optional, maximum RAM for dynamic memory (when dynamicMemory is true)
      dynamicMemory: false # default, set to true to enable Hyper-V dynamic memory management
      disk: 50GB # default
env:
  httpProxy: # default
  additionalHooksDir: # default
  restartPostInstallCount: # default
installBehavior:
  showOutput: false # default
  deleteFilesForOfflineInstallation: false # default
  forceOnlineInstallation: false # default
  wsl: false # default
  appendLog: false # default
  skipStart: false # default
