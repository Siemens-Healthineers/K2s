# Build k2s Pipeline
# Validates that the k2s CLI builds and tests pass.
# Go-built binaries are no longer committed to git — they must be built locally after clone.
# NOTE: This workflow previously created PRs to auto-commit binaries.
# That pattern is now obsolete. Kept as a build validation workflow.

name: "Build - k2s CLI (validate)"

on:
  workflow_dispatch:
#  push:
#    branches:
#      - "main"
#    paths:
#      - 'k2s/**'
#      - '!k2s/test/**'

env:
  GOVERSION: "1.26.4"

jobs:
  build-k2s-cli:
    name: Build k2s CLI (validate)
    timeout-minutes: 30
    continue-on-error: false
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Golang
      uses: actions/setup-go@v5
      with:
        go-version: ${{env.GOVERSION}}
        cache-dependency-path: "**/*.sum"

    - name: Current working directory
      run: |
        ls

    - name: Build k2s executable
      run: |
        .\smallsetup\common\BuildGoExe.ps1
        ls

    - name: Run ci Acceptance Tests
      shell: powershell
      run: |
        $ErrorActionPreference = "Continue"
        .\test\execute_all_tests.ps1 -Tags ci -ExcludeTags unit, integration -V -ThrowOnFailure








