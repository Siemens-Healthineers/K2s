# CI Pipeline for Addon Controller
# Builds and tests the GitOps addon controller for Linux and Windows.

name: "CI - Addon Controller"

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    paths:
      - 'addons/rollout/controller/pkg/**'
      - 'addons/rollout/controller/Dockerfile'
      - 'addons/rollout/controller/Dockerfile.windows'
      - 'addons/rollout/controller/crds/**'
      - 'addons/rollout/controller/manifests/**'
  pull_request:
    branches:
      - "main"
    paths:
      - 'addons/rollout/controller/pkg/**'
      - 'addons/rollout/controller/Dockerfile'
      - 'addons/rollout/controller/Dockerfile.windows'
      - 'addons/rollout/controller/crds/**'
      - 'addons/rollout/controller/manifests/**'

env:
  GOVERSION: "1.25.7"

jobs:
  lint-and-test:
    name: Lint & Test
    timeout-minutes: 15
    runs-on: windows-latest
    defaults:
      run:
        working-directory: addons/rollout/controller/pkg/controller
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}
          cache-dependency-path: "addons/rollout/controller/pkg/controller/go.sum"

      - name: Go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test -v -count=1 -race ./...

  build-linux:
    name: Build Linux Binary
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: addons/rollout/controller/pkg/controller
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}
          cache-dependency-path: "addons/rollout/controller/pkg/controller/go.sum"

      - name: Build for linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          VERSION=$(cat ../../../../../VERSION 2>/dev/null || echo "dev")
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags="-s -w -X main.version=${VERSION} -X main.gitCommit=${GIT_COMMIT} -X main.buildDate=${BUILD_DATE}" -o addon-controller ./cmd/

      - name: Upload linux binary
        uses: actions/upload-artifact@v4
        with:
          name: addon-controller-linux-amd64
          path: addons/rollout/controller/pkg/controller/addon-controller
          retention-days: 7

  build-windows:
    name: Build Windows Binary
    timeout-minutes: 15
    runs-on: windows-latest
    needs: lint-and-test
    defaults:
      run:
        working-directory: addons/rollout/controller/pkg/controller
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}
          cache-dependency-path: "addons/rollout/controller/pkg/controller/go.sum"

      - name: Build for windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: |
          $version = Get-Content "..\..\..\..\..\VERSION" -ErrorAction SilentlyContinue
          if (-not $version) { $version = "dev" }
          $gitCommit = git rev-parse --short HEAD
          $buildDate = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          go build -ldflags="-s -w -X main.version=$version -X main.gitCommit=$gitCommit -X main.buildDate=$buildDate" -o addon-controller.exe ./cmd/

      - name: Upload windows binary
        uses: actions/upload-artifact@v4
        with:
          name: addon-controller-windows-amd64
          path: addons/rollout/controller/pkg/controller/addon-controller.exe
          retention-days: 7
